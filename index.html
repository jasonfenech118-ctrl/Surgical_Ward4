    /* =========================================================
       MDH SURGICAL STAFFING — PROFESSIONAL MONTHLY ROSTER GRID
       Full replacement styling: wider readable date boxes, clear grid,
       dark professional header, and compact but legible shift cells.
       ========================================================= */
    .roster-table-card{
      margin-left:calc(50% - 50vw + 8px)!important;
      margin-right:calc(50% - 50vw + 8px)!important;
      padding:10px!important;
      border-radius:16px!important;
      background:#ffffff!important;

    .roster-table-wrap{

      max-width:100%!important;

      overflow-y:visible!important;
      border:1px solid #94a3b8!important;
      border-radius:16px!important;
      background:#ffffff!important;
      box-shadow:0 8px 24px rgba(15,23,42,.07)!important;
    }

    .roster-table{
      width:max-content!important;
      min-width:1548px!important;
      table-layout:fixed!important;
      border-collapse:separate!important;
      border-spacing:0!important;

      padding:4px 3px!important;

    const SUPABASE_URL = SUPABASE_URL_RAW.replace(/\/rest\/v1\/?$/i, "").replace(/\/$/i, "");

    let appState={session:null,ref:null,profile:null,wards:[],activeTab:null,selectedWardId:null,selectedOverviewWardId:"",selectedRelievingWardId:"",selectedDate:todayISO(),selectedMonth:monthISO(new Date()),selectedAuditWardId:"",selectedKpiStaffId:"",staffRows:[],monthlyRosterRows:[],monthlyExtraRows:[]};

    function emergencyShowError(message){const msg=String(message||"Unknown app error");console.error(msg);const login=document.getElementById("loginScreen"),app=document.getElementById("appScreen"),target=document.getElementById("message")||document.getElementById("loginMessage");if(app)app.classList.remove("hidden");if(login)login.classList.add("hidden");if(target)target.innerHTML=`<div class="error">App error: ${escapeHtml(msg)}</div>`;}

    async function boot(){clearMessage();if(!appState.session){showLogin();return;}await loadReferenceData();showApp();}
    function showLogin(){document.getElementById("loginScreen").classList.remove("hidden");document.getElementById("appScreen").classList.add("hidden");document.getElementById("topUser").textContent="Not signed in";}
    function showApp(){document.getElementById("loginScreen").classList.add("hidden");document.getElementById("appScreen").classList.remove("hidden");const p=appState.profile;if(!p){showError("Login succeeded, but no staff profile was returned for this account. Check the staff/user profile link in Supabase.");document.getElementById("topUser").textContent="Signed in — no profile returned";return;}document.getElementById("topUser").innerHTML=`<strong>${escapeHtml(p.full_name||p.email||"Signed in")}</strong><br>${labelRole(p.role)}`;document.getElementById("mainTitle").textContent="Surgical Ward 4";document.getElementById("mainSubtitle").textContent="Monthly roster and ward tools.";const validTabs=getTabs().map(t=>t[0]);if(!appState.activeTab||!validTabs.includes(appState.activeTab))appState.activeTab="monthlyRoster";buildTabs();renderTab(appState.activeTab);}

    function ensureShiftPickerModal(){let modal=document.getElementById("shiftPickerBackdrop");if(modal)return modal;modal=document.createElement("div");modal.id="shiftPickerBackdrop";modal.className="shift-modal-backdrop hidden";modal.innerHTML=`<div class="shift-modal" role="dialog" aria-modal="true"><div class="shift-modal-header"><div><h2 class="shift-modal-title" id="shiftPickerTitle">Update Shift / Add Hourly Leave</h2><div class="shift-modal-subtitle" id="shiftPickerSubtitle"></div></div><button type="button" class="secondary small" onclick="closeShiftPickerModal()">Close</button></div><div><div class="shift-modal-section-title" id="shiftFullDayHeading">Full-day change</div><div class="shift-choice-grid" id="shiftChoiceGrid"></div><label id="shiftPickerNoteLabel">Notes for full-day change (optional)</label><textarea class="shift-modal-note" id="shiftPickerNotes" placeholder="Any notes..."></textarea><div class="shift-modal-section-title">Add hourly leave</div><small class="helper">Use this for 1-hour, 2-hours or 4-hours leave, study leave, sick leave or TIL. This does not change the whole shift.</small><div class="hourly-grid"><div><label>Leave Type</label><select id="shiftPickerHourlyType"></select></div><div><label>Start</label><input id="shiftPickerHourlyStart" type="time" value="07:00"></div><div><label>Hours</label><select id="shiftPickerHourlyHours"><option value="1">1 hour</option><option value="2">2 hours</option><option value="4">4 hours</option></select></div></div><div class="hour-chip-row"><button type="button" class="hour-chip active" data-hours="1" onclick="selectHourlyHours(1)">1 hour leave</button><button type="button" class="hour-chip" data-hours="2" onclick="selectHourlyHours(2)">2 hours</button><button type="button" class="hour-chip" data-hours="4" onclick="selectHourlyHours(4)">4 hours</button></div><label style="margin-top:10px">Hourly Leave Notes</label><textarea class="shift-modal-note" id="shiftPickerHourlyNotes" placeholder="Optional reason / private note to Svetlana"></textarea><div class="shift-modal-actions"><button type="button" class="secondary" onclick="closeShiftPickerModal()">Cancel</button><button type="button" class="success" id="shiftPickerSaveFullBtn" onclick="saveShiftPickerModal()">Save full-day change</button></div><div class="shift-modal-actions" style="grid-template-columns:1fr;margin-top:10px"><button type="button" class="success" id="shiftPickerSaveHourlyBtn" onclick="saveHourlyLeaveFromModal()">Save hourly leave</button></div></div></div>`;modal.addEventListener("click",e=>{if(e.target===modal)closeShiftPickerModal();});document.body.appendChild(modal);return modal;}
    function selectHourlyHours(hours){const select=document.getElementById("shiftPickerHourlyHours");if(select)select.value=String(hours);document.querySelectorAll(".hour-chip").forEach(btn=>btn.classList.toggle("active",btn.dataset.hours===String(hours)));}
    function editRosterShift(staffId,shiftDate,currentCode){const staff=findMonthlyStaff(staffId);if(!isRosterManager()&&!currentUserMatchesStaffRow(staff)){showError("You can only book leave or hourly leave for your own row.");return;}openShiftPicker(staffId,shiftDate,currentCode||"");}
    function openShiftPicker(staffId,shiftDate,currentCode){clearMessage();const staff=findMonthlyStaff(staffId),cleanCurrent=normaliseRosterCode(currentCode||"");const manage=isRosterManager();const defaultCode=manage?(cleanCurrent&&cleanCurrent!=="LL"?cleanCurrent:"D"):(SW4_REQUEST_CHOICES.some(x=>x.code===cleanCurrent)?cleanCurrent:"L");shiftPickerState={staffId,shiftDate,currentCode:cleanCurrent,selectedCode:defaultCode,manage,staff};const modal=ensureShiftPickerModal();const staffName=cleanStaffName(staff?.full_name||"Staff member"),role=labelRole(staff?.role||"");document.getElementById("shiftPickerTitle").textContent=manage?"Update Shift / Add Hourly Leave":"Book Leave / Add Hourly Leave";document.getElementById("shiftPickerSubtitle").innerHTML=`${escapeHtml(staffName)}${role?` — ${escapeHtml(role)}`:""}<br>${escapeHtml(formatDate(shiftDate))}`;document.getElementById("shiftFullDayHeading").textContent=manage?"Full-day change":"Full-day request";document.getElementById("shiftPickerNoteLabel").textContent=manage?"Notes for full-day change (optional)":"Private note to Svetlana (optional)";document.getElementById("shiftPickerNotes").placeholder=manage?"Any notes...":"Reason / private note to Svetlana";document.getElementById("shiftPickerHourlyNotes").placeholder="Optional reason / private note to Svetlana";document.getElementById("shiftPickerNotes").value="";document.getElementById("shiftPickerHourlyNotes").value="";document.getElementById("shiftPickerHourlyStart").value="07:00";populateHourlyTypeOptions();selectHourlyHours(1);renderShiftPickerChoices();document.getElementById("shiftPickerSaveFullBtn").textContent=manage?"Save full-day change":"Send full-day request";document.getElementById("shiftPickerSaveHourlyBtn").textContent="Save hourly leave";modal.classList.remove("hidden");}

    function renderShiftPickerChoices(){const state=shiftPickerState||{},selected=state.selectedCode||"",choices=state.manage?SW4_MANAGER_CHOICES:SW4_REQUEST_CHOICES;document.getElementById("shiftChoiceGrid").innerHTML=choices.map(c=>`<button type="button" class="shift-choice-btn ${c.code===selected?"active":""}" onclick="selectShiftPickerCode('${escapeHtml(c.code)}')"><span class="shift-choice-code shift-${escapeHtml(c.code)}">${escapeHtml(displayShiftCode(c.code))}</span><span class="shift-choice-label">${escapeHtml(c.label)}</span></button>`).join("");}
    function selectShiftPickerCode(code){if(!shiftPickerState)return;shiftPickerState.selectedCode=normaliseRosterCode(code);renderShiftPickerChoices();}
    function closeShiftPickerModal(){const modal=document.getElementById("shiftPickerBackdrop");if(modal)modal.classList.add("hidden");shiftPickerState=null;}
    async function saveShiftPickerModal(){if(!shiftPickerState){closeShiftPickerModal();return;}const state=shiftPickerState,chosen=normaliseRosterCode(state.selectedCode),current=normaliseRosterCode(state.currentCode),notes=document.getElementById("shiftPickerNotes")?.value?.trim()||null;if(!chosen){showError("Choose a value.");return;}if(chosen==="LL"){showError("Long Leave is automatic and is no longer selectable from the legend.");return;}if(state.manage){closeShiftPickerModal();if(chosen===current)return;const storedCode=storeRosterCode(chosen);const{error}=await sb.rpc("upsert_ward_roster_override",{p_ward_id:appState.selectedWardId,p_staff_id:state.staffId,p_shift_date:state.shiftDate,p_shift_code:storedCode,p_override_reason:reasonForShift(storedCode),p_notes:notes});if(error){showError(error.message);return;}showSuccess("Roster status updated.");await renderMonthlyRoster();return;}const{error}=await sb.rpc("submit_sw4_leave_request",{p_request_date:state.shiftDate,p_request_code:chosen,p_is_hourly:false,p_start_time:null,p_hours:null,p_staff_note:notes});if(error){showError(error.message);return;}closeShiftPickerModal();showSuccess("Leave request sent to Svetlana for approval.");if(appState.activeTab==="leaveTil")await renderLeaveTil();}
    async function saveHourlyLeaveFromModal(){if(!shiftPickerState){closeShiftPickerModal();return;}const state=shiftPickerState;const staff=state.staff||findMonthlyStaff(state.staffId);if(!currentUserMatchesStaffRow(staff)&&!isLeaveApprover()){showError("Hourly leave requests can only be booked for your own row.");return;}const requestCode=normaliseRosterCode(document.getElementById("shiftPickerHourlyType")?.value||"L");const startTime=document.getElementById("shiftPickerHourlyStart")?.value||"07:00";const hours=Number(document.getElementById("shiftPickerHourlyHours")?.value||1);const notes=document.getElementById("shiftPickerHourlyNotes")?.value?.trim()||null;const{error}=await sb.rpc("submit_sw4_leave_request",{p_request_date:state.shiftDate,p_request_code:requestCode,p_is_hourly:true,p_start_time:startTime,p_hours:hours,p_staff_note:notes});if(error){showError(error.message);return;}closeShiftPickerModal();showSuccess("Hourly leave request sent to Svetlana for approval.");if(appState.activeTab==="leaveTil")await renderLeaveTil();}
    async function renderLeaveTil(){const myResult=await sb.rpc("list_my_sw4_leave_requests");if(myResult.error)throw myResult.error;let approverRows=[];if(isLeaveApprover()){const approverResult=await sb.rpc("list_sw4_leave_requests_for_approver",{p_status:null});if(approverResult.error)throw approverResult.error;approverRows=approverResult.data||[];}const myRows=myResult.data||[];document.getElementById("content").innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>Leave & TIL</h2><h1>Surgical Ward 4</h1><p class="muted">Book leave from the Monthly Roster by clicking your own day cell. Private notes are visible only to Svetlana Fenech for approval.</p></div><div>${wardSelectorHtml()}</div></div>${leaveStatusStrip(myRows)}</div>${isLeaveApprover()?`<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h3>Pending requests for approval</h3><p class="muted">Svetlana can read private notes and approve or reject leave / hourly leave requests here.</p></div><button class="secondary small" type="button" onclick="renderLeaveTil()">Refresh list</button></div>${leaveStatusStrip(approverRows)}${approverRows.length?approverRows.map(row=>`<div class="leave-request-card"><div class="leave-request-head"><div><div class="leave-request-name">${escapeHtml(cleanStaffName(row.staff_full_name||row.full_name||"Staff member"))}</div><div class="leave-request-meta">${escapeHtml(formatDate(row.request_date))} · ${escapeHtml(requestSummaryText(row))}<br>Submitted ${escapeHtml(shortDateTime(row.created_at)||"")}</div></div><div>${requestStatusPill(row.status)}</div></div><div class="leave-inline-grid"><div><label>Request type</label><div>${escapeHtml(requestCodeLabel(row.request_code))}</div></div><div><label>Scope</label><div>${row.is_hourly?`${escapeHtml(String(row.hours||1))} hour(s)`:"Full day"}</div></div><div><label>Start</label><div>${escapeHtml(row.start_time||"—")}</div></div><div><label>Requested by</label><div>${escapeHtml(cleanStaffName(row.staff_full_name||row.full_name||""))}</div></div></div><div class="leave-request-note"><strong>Private note to Svetlana:</strong><br>${escapeHtml(row.staff_note||"No note added.")}</div><div class="leave-approver-actions"><textarea id="approverNote_${row.id}" placeholder="Optional reply / approver note"></textarea><button type="button" class="success" onclick="decideSw4LeaveRequest('${escapeHtml(row.id)}','approved')">Approve</button><button type="button" class="danger" onclick="decideSw4LeaveRequest('${escapeHtml(row.id)}','rejected')">Reject</button></div></div>`).join(""):`<div class="info">No leave or hourly leave requests are waiting for approval.</div>`}</div>`:""}<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h3>My requests</h3><p class="muted">You can see your own requests and any approver notes here.</p></div><button class="secondary small" type="button" onclick="renderLeaveTil()">Refresh list</button></div><div class="table-wrap"><table class="leave-table"><thead><tr><th>Date</th><th>Request</th><th>Details</th><th>Status</th><th>My note</th><th>Approver note</th></tr></thead><tbody>${myRows.map(row=>`<tr><td>${escapeHtml(formatDate(row.request_date))}</td><td>${escapeHtml(requestCodeLabel(row.request_code))}</td><td>${escapeHtml(requestSummaryText(row))}</td><td>${requestStatusPill(row.status)}</td><td>${escapeHtml(row.staff_note||"")}</td><td>${escapeHtml(row.approver_note||"")}</td></tr>`).join("")||`<tr><td colspan="6" class="muted">No leave or TIL requests submitted yet.</td></tr>`}</tbody></table></div></div>`;}
    async function decideSw4LeaveRequest(requestId,decision){clearMessage();const approverNote=document.getElementById(`approverNote_${requestId}`)?.value?.trim()||null;const{error}=await sb.rpc("decide_sw4_leave_request",{p_request_id:requestId,p_decision:decision,p_approver_note:approverNote});if(error){showError(error.message);return;}showSuccess(decision==="approved"?"Request approved.":"Request rejected.");await renderLeaveTil();}

<script>
  /* --- SW4 v4 monthly roster legend + pending/approved leave overlay --- */
  (function(){
    const originalBuildTabs = window.buildTabs;
    window.buildTabs = function(){
      const tabsEl=document.getElementById("tabs");
      if(!tabsEl) return;
      tabsEl.innerHTML=getTabs().map(([key,label])=>`<button type="button" class="tab ${appState.activeTab===key?"active":""}" onclick="renderTab('${key}')"><span>${escapeHtml(label)}</span></button>`).join("");
    };
  })();
  function normaliseRosterCode(code){const raw=String(code||"").trim().toUpperCase();if(!raw||raw==="—"||raw==="-")return"";const aliases={A:"L",AL:"L",ANNUAL:"L",ANNUAL_LEAVE:"L",LEAVE:"L",S:"SL",SICK:"SL",SICK_LEAVE:"SL",MATERNITY:"ML",MATERNITY_LEAVE:"ML",STUDY:"ST",STUDY_LEAVE:"ST",TILIN:"TI",TIL_IN:"TI",TILOUT:"TO",TIL_OUT:"TO",OVERTIME:"OT",VACATION:"VL",VACATION_LEAVE:"VL",PENDING:"PL",PENDING_LEAVE:"PL",APPROVED:"APP",APPROVED_LEAVE:"APP",LONG_LEAVE:"LL"};return aliases[raw]||raw;}
  function shiftLabel(code){const labels={D:"Day",N:"Night",O:"Off",R:"Rest",L:"Leave",AL:"Leave",SL:"Sick Leave",ML:"Maternity",ST:"Study",TI:"TIL In",TO:"TIL Out",OT:"Overtime",VL:"Vacation Leave",PL:"Pending Leave",APP:"Approved Leave",ALV:"Approved Leave",LL:"Long Leave",M:"Morning",E:"Evening"};const clean=normaliseRosterCode(code);return labels[clean]||clean||"";}
  function shiftBadge(code){const cleanCode=normaliseRosterCode(code||"");if(!cleanCode)return`<span class="shift-cell shift-O">—</span>`;return`<span class="shift-cell shift-${escapeHtml(cleanCode)}" title="${escapeHtml(displayShiftCode(cleanCode))} — ${escapeHtml(shiftLabel(cleanCode))}">${escapeHtml(displayShiftCode(cleanCode))}</span>`;}
  function displayShiftCode(code){const clean=normaliseRosterCode(code);if(clean==="APP")return"AL";return clean||"—";}
  function leaveOverlayDisplayCode(map, staffId, isoDate, fallbackCode){const key=`${staffId}|${isoDate}`;const row=map[key];if(!row)return fallbackCode;const status=String(row.status||"").toLowerCase();if(status==="pending")return"PL";if(status==="approved")return"APP";return fallbackCode;}
  async function loadLeaveStatusMapForMonth(start,end){const out={};try{const res=await sb.rpc("get_sw4_leave_roster_statuses",{p_start_date:start,p_end_date:end});if(res.error)throw res.error;for(const row of (res.data||[])){out[`${row.staff_id}|${row.request_date}`]=row;}return out;}catch(err){console.warn("Leave overlay not loaded",err);return out;}}
  async function renderMonthlyRoster(){const wardId=requireSelectedWard();const monthValue=appState.selectedMonth;const{start,end,days}=monthRange(monthValue);const selectedW=selectedWard();const[rosterResult,holidayResult,leaveMap]=await Promise.all([sb.rpc("get_my_ward_roster_between",{p_ward_id:wardId,p_start_date:start,p_end_date:end}),sb.rpc("get_malta_public_holidays",{p_start_date:start,p_end_date:end}),loadLeaveStatusMapForMonth(start,end)]);if(rosterResult.error)throw rosterResult.error;if(holidayResult.error)throw holidayResult.error;const grouped=groupRosterByStaff(rosterResult.data||[]),holidays=holidayResult.data||[];appState.monthlyRosterRows=grouped;const holidayMap={};for(const h of holidays)holidayMap[h.holiday_date]=h;document.getElementById("content").innerHTML=`<div class="card roster-hero"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>Monthly Roster</h2><h1>${escapeHtml(selectedW?.ward_name||"Selected Ward")}</h1><p class="muted">${escapeHtml(selectedW?.ward_code||"")} · ${escapeHtml(monthLabel(monthValue))} · Click your own cell to book leave, or update shifts if authorised.</p></div><div class="roster-nav">${wardSelectorHtml()}<div><label>Month</label><input type="month" value="${monthValue}" onchange="setSelectedMonth(this.value)"></div><div><label>Jump to date</label><input id="rosterJumpDate" type="date"></div><button class="secondary" type="button" onclick="jumpRosterDate()">Jump</button><button class="secondary" type="button" onclick="changeRosterMonth(-1)">← Prev</button><button class="secondary" type="button" onclick="goRosterToday()">Today</button><button class="secondary" type="button" onclick="changeRosterMonth(1)">Next →</button></div></div></div><div class="card"><div class="legend-compact">${legend("D","Day")}${legend("N","Night")}${legend("O","Off")}${legend("R","Rest")}${legend("PL","Pending Leave")}${legend("APP","Approved Leave")}${legend("L","Leave")}${legend("SL","Sick Leave")}${legend("ML","Maternity")}${legend("ST","Study")}${legend("TI","TIL In")}${legend("TO","TIL Out")}${legend("OT","Overtime")}${legend("VL","Vacation Leave")}</div></div><div class="card roster-table-card"><div class="table-wrap roster-table-wrap"><table class="roster-table"><thead><tr><th>Staff Member</th>${days.map(d=>{const key=isoFromDate(d),h=holidayMap[key];return `<th class="${h?"holiday-col":""} ${key===todayISO()?"today-col":""}"><div class="day-head"><span>${weekdayShort(d)}</span><span>${d.getDate()}</span>${h?`<span class="holiday-label" title="${escapeHtml(h.holiday_name)}">${escapeHtml(h.short_label||h.holiday_name)}</span>`:""}</div></th>`;}).join("")}</tr></thead><tbody>${grouped.map(staff=>`<tr><td><span class="staff-name-line">${escapeHtml(cleanStaffName(staff.full_name))}</span><span class="staff-role-line">${escapeHtml(labelRole(staff.role))}</span><span class="staff-shift-line">${escapeHtml(staffRosterLabel(staff))}</span></td>${days.map(day=>{const key=isoFromDate(day),r=staff.days[key],actualCode=r?.live_shift_code||"",baseDisplay=longLeaveDisplayCode(staff.days,key,actualCode),displayCode=leaveOverlayDisplayCode(leaveMap,staff.staff_id,key,baseDisplay),h=holidayMap[key];return `<td class="${h?"holiday-col":""} ${key===todayISO()?"today-col":""}">${shiftButton(staff.staff_id,key,displayCode,r?.source_type==="override",actualCode)}</td>`;}).join("")}</tr>`).join("")||`<tr><td colspan="${days.length+1}" class="muted">No core roster rows found for this ward/month.</td></tr>`}</tbody></table></div></div>`;}
</script>
