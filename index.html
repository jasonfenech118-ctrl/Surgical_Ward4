  renderChangeOfDuty = async function(){
    const year=Number((appState.selectedMonth||monthISO(new Date())).slice(0,4));
    const monthDates=monthDateOptions();
    const sundays=sundayOptionsForYear(year);
    const holidays=await holidayOptionsForYear(year);
    const staffRows=sw4IsFullControl()?await loadSw4StaffOptions():[];
    const rows=sw4IsFullControl()?await sw4RpcOrEmpty('list_sw4_change_of_duty',{p_start_date:`${year}-01-01`,p_end_date:`${year}-12-31`,p_status:null}):await sw4RpcOrEmpty('list_my_sw4_change_of_duty',{p_start_date:`${year}-01-01`,p_end_date:`${year}-12-31`,p_status:null});
    document.getElementById('content').innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>Change of Duty</h2><h1>Surgical Ward 4</h1><p class="muted">Change of Duty entries must be approved by system administrators before they are applied to the roster.</p></div><div><label>Month</label><input type="month" value="${appState.selectedMonth}" onchange="setSelectedMonth(this.value)"></div></div></div>${codSection('📅 Normal Day Swap','','normal','normalCod',staffRows,monthDates,monthDates,rows)}${codSection('🇲🇹 Public Holiday Swap','holiday','public_holiday','holidayCod',staffRows,holidays,holidays,rows)}${codSection('☀️ Sunday Swap','sunday','sunday','sundayCod',staffRows,sundays,sundays,rows)}`;
    sw4ApplyHeaderBranding();
  };

  createCod = async function(type,prefix){
    clearMessage();
    const staffId=sw4IsFullControl()?document.getElementById(`${prefix}Staff`)?.value:(profileStaffId ? profileStaffId() : (appState.profile?.staff_id||appState.profile?.id||null));
    const off=document.getElementById(`${prefix}Off`)?.value;
    const worked=document.getElementById(`${prefix}Worked`)?.value;
    const notes=document.getElementById(`${prefix}Notes`)?.value?.trim()||null;
    if(!staffId||!off||!worked){showError('Choose day off and day worked instead.');return;}
    const {error}=await sb.rpc('create_sw4_change_of_duty',{p_staff_id:staffId,p_cod_type:type,p_off_date:off,p_worked_date:worked,p_notes:notes});
    if(error){showError(error.message);return;}
    showSuccess(sw4IsFullControl() ? 'Change of Duty recorded and approved.' : 'Change of Duty request recorded and sent for approval.');
    await renderChangeOfDuty();
  };

  function myRecordHistoryButtons(active){
    const buttons=[["all","All"],["leave","Leave"],["sick","Sick Leave"],["til_in","TIL In"],["til_out","TIL Out"],["overtime","Overtime"],["study","Study"],["maternity","Maternity"],["cod","Change of Duty"]];
    return `<div class="sw4-record-filter-row">${buttons.map(([v,l])=>`<button type="button" class="secondary ${active===v?'active':''}" onclick="setMyRecordsFilter('${v}')">${escapeHtml(l)}</button>`).join('')}</div>`;
  }
  function sw4RecordCategory(rec){const code=normaliseRosterCode(rec.code||'');if(rec.kind==='cod')return 'cod';if(['L','VL','APP'].includes(code))return 'leave';if(code==='SL')return 'sick';if(code==='TI')return 'til_in';if(code==='TO')return 'til_out';if(code==='OT')return 'overtime';if(code==='ST')return 'study';if(code==='ML')return 'maternity';return 'all';}
  function sw4RecordStatusBadge(status){return requestStatusPill(status||'pending');}

  renderMyRecords = async function(){
    const active=appState.myRecordsFilter||'all';
    const {start,end}=monthRange(appState.selectedMonth||monthISO(new Date()));
    const [leaveRows,inviteRows,codRows]=await Promise.all([
      sw4RpcOrEmpty('list_my_sw4_leave_requests'),
      sw4RpcOrEmpty('list_my_sw4_overtime_invites'),
      sw4RpcOrEmpty('list_my_sw4_change_of_duty',{p_start_date:start,p_end_date:end,p_status:null})
    ]);
    const records=[];
    for(const r of (leaveRows||[])){const d=String(r.request_date||'');if(d>=start&&d<=end)records.push({kind:'request',date:d,code:normaliseRosterCode(r.request_code),type:requestCodeLabel(r.request_code),details:requestSummaryText(r),status:r.status,note:r.staff_note||r.approver_note||''});}
    for(const r of (inviteRows||[])){const d=String(r.invite_date||'');if(d>=start&&d<=end)records.push({kind:'invite',date:d,code:'OT',type:'Overtime invite',details:`${r.start_time||''} · ${r.hours||''} hour(s)`,status:r.status,note:r.manager_note||r.response_note||''});}
    for(const r of (codRows||[])){records.push({kind:'cod',date:String(r.off_date||r.worked_date||''),code:'COD',type:'Change of Duty',details:`Off ${formatDate(r.off_date)} · Worked ${formatDate(r.worked_date)}`,status:r.status,note:r.notes||''});}
    const filtered=records.filter(r=>active==='all'||sw4RecordCategory(r)===active).sort((a,b)=>String(b.date).localeCompare(String(a.date))||a.type.localeCompare(b.type));
    document.getElementById('content').innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>My Record History</h2><h1>Surgical Ward 4</h1>${myRecordHistoryButtons(active)}</div><div class="kpi-filter-row"><div><label>Month</label><select onchange="setSelectedMonthPart(this.value)">${sw4MonthDropdownOptions(monthNumberFromIsoMonth(appState.selectedMonth))}</select></div><div><label>Year</label><select onchange="setSelectedYearPart(this.value)">${sw4YearDropdownOptions(yearNumberFromIsoMonth(appState.selectedMonth))}</select></div></div></div></div><div class="card"><h3>${escapeHtml(monthLabel(appState.selectedMonth))}</h3><div class="table-wrap"><table class="kpi-small-table"><thead><tr><th>Date</th><th>Type</th><th>Details</th><th>Status</th><th>Notes</th></tr></thead><tbody>${filtered.map(r=>`<tr><td>${escapeHtml(formatDate(r.date))}</td><td><strong>${escapeHtml(r.type)}</strong></td><td>${escapeHtml(r.details||'')}</td><td>${sw4RecordStatusBadge(r.status)}</td><td>${escapeHtml(r.note||'')}</td></tr>`).join('') || `<tr><td colspan="5" class="muted">No records found for this filter and month.</td></tr>`}</tbody></table></div></div>`;
    sw4ApplyHeaderBranding();
  };

  const oldRenderLeaveTilV14 = renderLeaveTil;
  renderLeaveTil = async function(){
    await oldRenderLeaveTilV14();
    sw4ApplyHeaderBranding();
    const cards=[...document.querySelectorAll('#content .card')];
    cards.forEach(card=>{
      const h2=card.querySelector('h2');
      const h3=card.querySelector('h3');
      if(h2 && /Leave, TIL & Overtime/i.test(h2.textContent||'')){
        const p=card.querySelector('p.muted');
        if(p) p.textContent='Submit and review leave, TIL and overtime records here. Approval is handled according to system permissions.';
      }
      if(h3 && /My overtime invites/i.test(h3.textContent||'')){
        const p=card.querySelector('p.muted');
        if(p) p.textContent='Review and respond to your overtime invitations here.';
      }
      if(h3 && /My requests/i.test(h3.textContent||'')){
        const p=card.querySelector('p.muted');
        if(p) p.textContent='Your submitted requests and approval notes are shown below.';
      }
    });
  };

  renderOvertimePlanning = async function(){
    const date=appState.kpiPlanningDate||todayISO();
    const wardId=requireSelectedWard();
    const roster=await sb.rpc('get_my_ward_roster_between',{p_ward_id:wardId,p_start_date:date,p_end_date:date}); if(roster.error) throw roster.error;
    const rows=(roster.data||[]).filter(r=>['O','R'].includes(normaliseRosterCode(r.live_shift_code||r.baseline_shift_code))).sort(sw4CompareStaffRows);
    return `<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-end"><div><h3>Overtime planning</h3><p class="muted">Choose a date, view staff who are Off or Rest, and send a safe day, post-night or night overtime invite.</p></div><div><label>Date</label><input type="date" value="${date}" onchange="setKpiPlanningDate(this.value)"></div></div><div class="grid grid-4" style="margin-top:12px"><div><label>Type</label><select id="otInviteShift"><option value="day">Day overtime (07:00)</option><option value="postnight">Post-night overtime (12:00)</option><option value="night">Night overtime (19:00)</option></select></div><div><label>Hours</label><select id="otInviteHours">${sw4HourOptions(6,8)}</select></div><div><label>Note</label><input id="otInviteNote" placeholder="Optional note for nurse"></div><div><label>Start time</label><input id="otInviteStartDisplay" value="07:00" readonly></div></div><div class="table-wrap" style="margin-top:12px"><table class="kpi-small-table"><thead><tr><th>Available staff</th><th>Role</th><th>Current shift</th><th>Action</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${escapeHtml(sw4Name(r.full_name))}</strong></td><td>${escapeHtml(labelRole(r.role))}</td><td>${shiftBadge(r.live_shift_code||r.baseline_shift_code)}</td><td><button type="button" class="small success" onclick="sendSw4OvertimeInvite('${escapeHtml(r.staff_id)}','${escapeHtml(date)}')">Send overtime invite</button></td></tr>`).join('')||`<tr><td colspan="4" class="muted">No staff currently marked Off or Rest on this date.</td></tr>`}</tbody></table></div></div>`;
  };

  const oldRenderAuditVisualsV14 = renderAuditVisuals;
  renderAuditVisuals = async function(){
    await oldRenderAuditVisualsV14();
    sw4ApplyHeaderBranding();
  };

  function sw4TimeOptions(selected='07:00'){
    let html='';
    for(let h=0; h<24; h++){
      const v=String(h).padStart(2,'0')+':00';
      html += `<option value="${v}" ${v===selected?'selected':''}>${v}</option>`;
    }
    return html;
  }

  const hourlyEligibleCodes = new Set(['L','SL','TI','TO','OT','ST','ML']);
  const oldFullSaveV14 = saveShiftPickerModal;

  ensureShiftPickerModal = function(){
    let modal=document.getElementById('shiftPickerBackdrop');
    if(modal) return modal;
    modal=document.createElement('div');
    modal.id='shiftPickerBackdrop';
    modal.className='shift-modal-backdrop hidden';
    modal.innerHTML=`
      <div class="shift-modal sw4-professional-modal" role="dialog" aria-modal="true">
        <div class="shift-modal-header">
          <div>
            <h2 class="shift-modal-title" id="shiftPickerTitle">Update Shift / Add Request</h2>
            <div class="shift-modal-subtitle" id="shiftPickerSubtitle"></div>
          </div>
          <button type="button" class="secondary small" onclick="closeShiftPickerModal()">Close</button>
        </div>
        <div class="sw4-modal-block">
          <div class="shift-modal-section-title">Event type</div>
          <div class="shift-choice-grid" id="shiftChoiceGrid"></div>
        </div>
        <div class="sw4-modal-block">
          <label id="shiftPickerNoteLabel">Notes (optional)</label>
          <textarea class="shift-modal-note" id="shiftPickerNotes" placeholder="Optional reason or note"></textarea>
        </div>
        <div class="sw4-modal-block">
          <div class="shift-modal-section-title">Request duration / scope</div>
          <div class="hourly-grid sw4-scope-grid">
            <div><label>Start time</label><select id="shiftPickerEventStart">${sw4TimeOptions('07:00')}</select></div>
            <div><label>Duration / Scope</label><select id="shiftPickerScope"><option value="day">Day</option><option value="night">Night</option><option value="1">1 hour</option><option value="2">2 hours</option><option value="3">3 hours</option><option value="4">4 hours</option><option value="5">5 hours</option><option value="6">6 hours</option><option value="7">7 hours</option><option value="8">8 hours</option></select></div>
          </div>
        </div>
        <div class="shift-modal-actions sw4-single-save-row">
          <button type="button" class="secondary" onclick="closeShiftPickerModal()">Cancel</button>
          <button type="button" class="success" onclick="saveShiftPickerEvent()">Save Event</button>
        </div>
      </div>`;
    modal.addEventListener('click',e=>{ if(e.target===modal) closeShiftPickerModal(); });
    document.body.appendChild(modal);
    return modal;
  };

  openShiftPicker = function(staffId,shiftDate,currentCode){
    clearMessage();
    const staff=findMonthlyStaff(staffId), cleanCurrent=normaliseRosterCode(currentCode||'');
    const manage=isRosterManager();
    const requestChoices=(typeof SW4_REQUEST_CHOICES!=='undefined' ? SW4_REQUEST_CHOICES : []);
    const defaultCode=manage ? (cleanCurrent||'D') : (requestChoices.some(x=>x.code===cleanCurrent) ? cleanCurrent : 'L');
    shiftPickerState={staffId,shiftDate,currentCode:cleanCurrent,selectedCode:defaultCode,manage,staff};
    const modal=ensureShiftPickerModal();
    const staffName=sw4Name(staff?.full_name||'Staff member');
    const role=labelRole(staff?.role||'');
    document.getElementById('shiftPickerTitle').textContent=manage?'Update Shift / Add Request':'Book Leave, TIL or Overtime';
    document.getElementById('shiftPickerSubtitle').innerHTML=`${escapeHtml(staffName)}${role?` — ${escapeHtml(role)}`:''}<br>${escapeHtml(formatDate(shiftDate))}`;
    document.getElementById('shiftPickerNoteLabel').textContent='Notes (optional)';
    document.getElementById('shiftPickerNotes').value='';
    document.getElementById('shiftPickerEventStart').value='07:00';
    document.getElementById('shiftPickerScope').value='day';
    renderShiftPickerChoices();
    modal.classList.remove('hidden');
  };

  window.saveShiftPickerEvent = async function(){
    if(!shiftPickerState){ closeShiftPickerModal(); return; }
    const state=shiftPickerState;
    const scope=document.getElementById('shiftPickerScope')?.value||'day';
    if(scope==='day' || scope==='night'){
      if(scope==='night' && state.manage && normaliseRosterCode(state.selectedCode)==='D'){
        state.selectedCode='N';
      }
      if(scope==='day' && state.manage && normaliseRosterCode(state.selectedCode)==='N'){
        state.selectedCode='D';
      }
      return oldFullSaveV14();
    }
    const requestCode=normaliseRosterCode(state.selectedCode||'L');
    if(!hourlyEligibleCodes.has(requestCode)){
      showError('This event type should be saved as Day or Night, not as an hourly event.');
      return;
    }
    const startTime=document.getElementById('shiftPickerEventStart')?.value||'07:00';
    const hours=Number(scope||1);
    const notes=(document.getElementById('shiftPickerNotes')?.value||'').trim()||null;
    const {error}=await sb.rpc('submit_sw4_leave_request',{p_request_date:state.shiftDate,p_request_code:requestCode,p_is_hourly:true,p_start_time:startTime,p_hours:hours,p_staff_note:notes});
    if(error){ showError(error.message); return; }
    closeShiftPickerModal();
    showSuccess(sw4IsFullControl() ? `${requestCodeLabel(requestCode)} hourly record approved automatically.` : `${requestCodeLabel(requestCode)} hourly request saved.`);
    if(appState.activeTab==='leaveTil') await renderLeaveTil();
    else if(appState.activeTab==='monthlyRoster') await renderMonthlyRoster();
  };

  document.addEventListener('DOMContentLoaded', sw4ApplyHeaderBranding);
  setTimeout(sw4ApplyHeaderBranding, 0);
})();
</script>

  const oldBuildTabsV16 = typeof buildTabs === 'function' ? buildTabs : null;
  if(oldBuildTabsV16){
    buildTabs=function(){
      if(typeof getTabs === 'function'){
        const oldGetTabs=getTabs;
        getTabs=function(){return oldGetTabs().filter(t=>!String(t[0]||'').toLowerCase().includes('chart') && !String(t[1]||'').toLowerCase().includes('chart'));};
      }
      oldBuildTabsV16();
    };

  const oldRenderTabV16 = typeof renderTab === 'function' ? renderTab : null;

})();

<script>
/* =========================================================
   SW4 v17 — pending requests show the actual requested type
   inside the Monthly Roster cell, and Night has a distinct colour.
   HTML-only change. No SQL required.
   ========================================================= */
(function(){
  const oldDisplayShiftCodeV17 = displayShiftCode;
  displayShiftCode = function(code){
    const clean = normaliseRosterCode(code);
    const map = {
      PVL:'VL', PL:'VL', PSL:'SL', PML:'ML', PST:'ST', PTI:'TI', PTO:'TO', POT:'OT', PCODON:'COD', PCODOFF:'COD', PCOD:'COD',
      CODON:'COD', CODOFF:'COD', APP:'VL', ATI:'TI', ATO:'TO', AOT:'OT'
    };
    return map[clean] || oldDisplayShiftCodeV17(code);
  };

  const oldShiftLabelV17 = shiftLabel;
  shiftLabel = function(code){
    const clean = normaliseRosterCode(code);
    const labels = {
      PVL:'Pending Leave', PL:'Pending Leave', PSL:'Pending Sick Leave', PML:'Pending Maternity Leave', PST:'Pending Study Leave',
      PTI:'Pending TIL In', PTO:'Pending TIL Out', POT:'Pending Overtime', PCODON:'Pending COD on', PCODOFF:'Pending COD off', PCOD:'Pending Change of Duty',
      APP:'Approved Leave', ATI:'Approved TIL In', ATO:'Approved TIL Out', AOT:'Approved Overtime', CODON:'COD on', CODOFF:'COD off'
    };
    return labels[clean] || oldShiftLabelV17(code);
  };

  function sw4PendingCodeForRequest(requestCode){
    const req = normaliseRosterCode(requestCode || '');
    if(req === 'TI') return 'PTI';
    if(req === 'TO') return 'PTO';
    if(req === 'OT') return 'POT';
    if(req === 'SL') return 'PSL';
    if(req === 'ML') return 'PML';
    if(req === 'ST') return 'PST';
    return 'PVL';
  }

  leaveOverlayDisplayCode = function(map,staffId,isoDate,fallbackCode){
    const row = map?.[`${staffId}|${isoDate}`];
    if(!row) return fallbackCode;
    const status = String(row.status || '').toLowerCase();
    const req = normaliseRosterCode(row.request_code || '');
    if(status === 'pending') return sw4PendingCodeForRequest(req);
    if(status === 'approved'){
      if(req === 'TI') return 'ATI';
      if(req === 'TO') return 'ATO';
      if(req === 'OT') return 'AOT';
      if(req === 'SL') return 'SL';
      if(req === 'ML') return 'ML';
      if(req === 'ST') return 'ST';
      return 'APP';
    }
    return fallbackCode;
  };

  function sw4HoursText(row){
    if(!row) return '';
    const hourly = row.is_hourly === true || row.is_hourly === 'true' || Number(row.hours || 0) > 0;
    const hours = Number(row.hours || 0);
    if(!hourly || !hours) return '';
    return `${hours % 1 === 0 ? hours.toFixed(0) : hours.toFixed(1)}h`;
  }
  function sw4HoursMark(row){
    const text = sw4HoursText(row);
    return text ? `<span class="sw4-hour-mark">${escapeHtml(text)}</span>` : '';
  }

  async function sw4LoadCodStatusMapForMonth(start,end){
    const out = {};
    function addCod(row, statusOverride){
      if(!row) return;
      const staffId = row.staff_id;
      const status = String(statusOverride || row.status || 'approved').toLowerCase();
      if(staffId && row.worked_date){
        out[`${staffId}|${String(row.worked_date).slice(0,10)}`] = {status, kind:'on', code: status === 'pending' ? 'PCODON' : 'CODON'};
      }
      if(staffId && row.off_date){
        out[`${staffId}|${String(row.off_date).slice(0,10)}`] = {status, kind:'off', code: status === 'pending' ? 'PCODOFF' : 'CODOFF'};
      }
      if(staffId && row.cod_date){
        const kind = String(row.cod_kind || row.kind || '').toLowerCase();
        const code = status === 'pending' ? (kind === 'off' ? 'PCODOFF' : 'PCODON') : (kind === 'off' ? 'CODOFF' : 'CODON');
        out[`${staffId}|${String(row.cod_date).slice(0,10)}`] = {status, kind, code};
      }
    }
    try{
      const approved = await sb.rpc('get_sw4_change_of_duty_roster_markings',{p_start_date:start,p_end_date:end});
      if(!approved.error){
        for(const row of (approved.data || [])) addCod(row,'approved');
      }
    }catch(err){ console.warn('COD approved markings not loaded',err); }
    try{
      const all = await sw4RpcOrEmpty('list_sw4_change_of_duty',{p_start_date:start,p_end_date:end,p_status:null});
      for(const row of (all || [])) addCod(row,row.status);
    }catch(err){ console.warn('COD manager list not loaded',err); }
    try{
      const mine = await sw4RpcOrEmpty('list_my_sw4_change_of_duty',{p_start_date:start,p_end_date:end,p_status:null});
      for(const row of (mine || [])) addCod(row,row.status);
    }catch(err){ console.warn('My COD list not loaded',err); }
    return out;
  }

  function sw4LegendCompactV17(){
    return `${legend('D','Day')}${legend('N','Night')}${legend('O','Off')}${legend('R','Rest')}${legend('PVL','Pending')}${legend('APP','Leave')}${legend('SL','Sick')}${legend('ML','Maternity')}${legend('ST','Study')}${legend('TI','TIL In')}${legend('TO','TIL Out')}${legend('OT','Overtime')}${legend('CODON','COD')}`;
  }

  renderMonthlyRoster = async function(){
    const wardId=requireSelectedWard();
    const monthValue=appState.selectedMonth;
    const {start,end,days}=monthRange(monthValue);
    const selectedW=selectedWard();
    const [rosterResult,holidayResult,leaveMap,codStatusMap]=await Promise.all([
      sb.rpc('get_my_ward_roster_between',{p_ward_id:wardId,p_start_date:start,p_end_date:end}),
      sb.rpc('get_malta_public_holidays',{p_start_date:start,p_end_date:end}),
      loadLeaveStatusMapForMonth(start,end),
      sw4LoadCodStatusMapForMonth(start,end)
    ]);
    if(rosterResult.error) throw rosterResult.error;
    if(holidayResult.error) throw holidayResult.error;
    const grouped=groupRosterByStaff(rosterResult.data||[]), holidays=holidayResult.data||[];
    appState.monthlyRosterRows=grouped;
    const holidayMap={};
    for(const h of holidays) holidayMap[h.holiday_date]=h;
    const compactLegend=sw4LegendCompactV17();
    document.getElementById('content').innerHTML=`<div class="card roster-hero"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>Monthly Roster</h2><h1>${escapeHtml(selectedW?.ward_name||'Surgical Ward 4')}</h1><div class="roster-month-focus">${escapeHtml(monthLabel(monthValue))}</div></div><div class="roster-nav">${wardSelectorHtml()}<div><label>Month</label><input type="month" value="${monthValue}" onchange="setSelectedMonth(this.value)"></div><div><label>Jump to date</label><input id="rosterJumpDate" type="date"></div><button class="secondary" type="button" onclick="jumpRosterDate()">Jump</button><button class="secondary" type="button" onclick="changeRosterMonth(-1)">← Prev</button><button class="secondary" type="button" onclick="goRosterToday()">Today</button><button class="secondary" type="button" onclick="changeRosterMonth(1)">Next →</button></div></div></div><div class="card"><div class="legend-compact sw4-clean-legend">${compactLegend}</div></div><div class="card roster-table-card"><div class="table-wrap roster-table-wrap"><table class="roster-table"><thead><tr><th>Staff Member</th>${days.map(d=>{const key=isoFromDate(d),h=holidayMap[key];return `<th class="${h?'holiday-col':''} ${key===todayISO()?'today-col':''}"><div class="day-head"><span>${weekdayShort(d)}</span><span>${d.getDate()}</span>${h?`<span class="holiday-label" title="${escapeHtml(h.holiday_name)}">${escapeHtml(h.short_label||h.holiday_name)}</span>`:''}</div></th>`;}).join('')}</tr></thead><tbody>${grouped.map(staff=>`<tr><td><span class="staff-name-line">${escapeHtml(cleanStaffName(staff.full_name))}</span><span class="staff-role-line">${escapeHtml(labelRole(staff.role))}</span><span class="staff-shift-line">${escapeHtml(staffRosterLabel(staff))}</span></td>${days.map(day=>{const key=isoFromDate(day),r=staff.days[key],actualCode=r?.live_shift_code||'',baseDisplay=normaliseRosterCode(actualCode),leaveRow=leaveMap?.[`${staff.staff_id}|${key}`],codRow=codStatusMap?.[`${staff.staff_id}|${key}`],displayCode=codRow?.code || leaveOverlayDisplayCode(leaveMap,staff.staff_id,key,baseDisplay),h=holidayMap[key],showDot=sw4ShouldShowChangeDot(r);return `<td class="${h?'holiday-col':''} ${key===todayISO()?'today-col':''}">${shiftButton(staff.staff_id,key,displayCode,showDot,actualCode)}${sw4HoursMark(leaveRow)}</td>`;}).join('')}</tr>`).join('')||`<tr><td colspan="${days.length+1}" class="muted">No core roster rows found for this ward/month.</td></tr>`}</tbody></table></div></div>`;
    if(typeof sw4V16CleanHeader === 'function') sw4V16CleanHeader();
  };
})();
