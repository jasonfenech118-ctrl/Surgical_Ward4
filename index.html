    /* =========================================================
       MDH SURGICAL STAFFING — PROFESSIONAL MONTHLY ROSTER GRID
       Full replacement styling: wider readable date boxes, clear grid,
       dark professional header, and compact but legible shift cells.
       ========================================================= */
    .roster-table-card{
      margin-left:calc(50% - 50vw + 8px)!important;
      margin-right:calc(50% - 50vw + 8px)!important;
      padding:10px!important;
      border-radius:16px!important;
      background:#ffffff!important;

    .roster-table-wrap{

      max-width:100%!important;

      overflow-y:visible!important;
      border:1px solid #94a3b8!important;
      border-radius:16px!important;
      background:#ffffff!important;
      box-shadow:0 8px 24px rgba(15,23,42,.07)!important;
    }

    .roster-table{
      width:max-content!important;
      min-width:1548px!important;
      table-layout:fixed!important;
      border-collapse:separate!important;
      border-spacing:0!important;

      padding:4px 3px!important;

    async function renderMonthlyRoster(){const wardId=requireSelectedWard();const monthValue=appState.selectedMonth;const{start,end,days}=monthRange(monthValue);const selectedW=selectedWard();const[rosterResult,holidayResult]=await Promise.all([sb.rpc("get_my_ward_roster_between",{p_ward_id:wardId,p_start_date:start,p_end_date:end}),sb.rpc("get_malta_public_holidays",{p_start_date:start,p_end_date:end})]);if(rosterResult.error)throw rosterResult.error;if(holidayResult.error)throw holidayResult.error;const grouped=groupRosterByStaff(rosterResult.data||[]),holidays=holidayResult.data||[];appState.monthlyRosterRows=grouped;const holidayMap={};for(const h of holidays)holidayMap[h.holiday_date]=h;document.getElementById("content").innerHTML=`<div class="card roster-hero"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>Monthly Roster</h2><h1>${escapeHtml(selectedW?.ward_name||"Selected Ward")}</h1><p class="muted">${escapeHtml(selectedW?.ward_code||"")} · ${escapeHtml(monthLabel(monthValue))} · Click any shift cell to change status</p></div><div class="roster-nav">${wardSelectorHtml()}<div><label>Month</label><input type="month" value="${monthValue}" onchange="setSelectedMonth(this.value)"></div><div><label>Jump to date</label><input id="rosterJumpDate" type="date"></div><button class="secondary" type="button" onclick="jumpRosterDate()">Jump</button><button class="secondary" type="button" onclick="changeRosterMonth(-1)">← Prev</button><button class="secondary" type="button" onclick="goRosterToday()">Today</button><button class="secondary" type="button" onclick="changeRosterMonth(1)">Next →</button></div></div></div><div class="card"><div class="legend-compact">${legend("D","Day")}${legend("N","Night")}${legend("O","Off")}${legend("R","Rest")}${legend("L","Leave")}${legend("SL","Sick Leave")}${legend("ML","Maternity")}${legend("ST","Study")}${legend("TI","TIL In")}${legend("TO","TIL Out")}${legend("OT","Overtime")}${legend("LL","L     const SHIFT_PICKER_CHOICES=[{code:"D",label:"Day"},{code:"N",label:"Night"},{code:"O",label:"Off"},{code:"R",label:"Rest"},{code:"L",label:"Leave"},{code:"SL",label:"Sick Leave"},{code:"ML",label:"Maternity"},{code:"ST",label:"Study"},{code:"TI",label:"TIL In"},{code:"TO",label:"TIL Out"},{code:"OT",label:"Overtime"},{code:"M",label:"Morning"}];let shiftPickerState=null;function ensureShiftPickerModal(){let modal=document.getElementById("shiftPickerBackdrop");if(modal)return modal;modal=document.createElement("div");modal.id="shiftPickerBackdrop";modal.className="shift-modal-backdrop hidden";modal.innerHTML=`<div class="shift-modal" role="dialog" aria-modal="true"><div class="shift-modal-header"><div><h2 class="shift-modal-title">Update Shift</h2><div class="shift-modal-subtitle" id="shiftPickerSubtitle"></div></div><button type="button" class="secondary small" onclick="closeShiftPickerModal()">Close</button></div><div class="shift-choice-grid" id="shiftChoiceGrid"></div><label>Notes (optional)</label><textarea class="shift-modal-note" id="shiftPickerNotes" placeholder="Optional note for audit trail"></textarea><div class="shift-help">Long Leave is automatic. Select Leave, TIL In, TIL Out or Overtime as normal. When a continuous block reaches 3 days, the roster displays LL until the pattern is broken.</div><div class="shift-modal-actions"><button type="button" class="secondary" onclick="closeShiftPickerModal()">Cancel</button><button type="button" class="success" onclick="saveShiftPickerModal()">Save change</button></div></div>`;modal.addEventListener("click",e=>{if(e.target===modal)closeShiftPickerModal();});document.body.appendChild(modal);return modal;}function findMonthlyStaff(staffId){return(appState.monthlyRosterRows||[]).find(s=>String(s.staff_id)===String(staffId));}function editRosterShift(staffId,shiftDate,currentCode){openShiftPicker(staffId,shiftDate,currentCode||"");}function openShiftPicker(staffId,shiftDate,currentCode){clearMessage();const staff=     function ensureShiftPickerModal(){let modal=document.getElementById("shiftPickerBackdrop");if(modal)return modal;modal=document.createElement("div");modal.id="shiftPickerBackdrop";modal.className="shift-modal-backdrop hidden";modal.innerHTML=`<div class="shift-modal" role="dialog" aria-modal="true"><div class="shift-modal-header"><div><h2 class="shift-modal-title" id="shiftPickerTitle">Update Shift / Add Hourly Leave</h2><div class="shift-modal-subtitle" id="shiftPickerSubtitle"></div></div><button type="button" class="secondary small" onclick="closeShiftPickerModal()">Close</button></div><div><div class="shift-modal-section-title" id="shiftFullDayHeading">Full-day change</div><div class="shift-choice-grid" id="shiftChoiceGrid"></div><label id="shiftPickerNoteLabel">Notes for full-day change (optional)</label><textarea class="shift-modal-note" id="shiftPickerNotes" placeholder="Any notes..."></textarea><div class="shift-modal-section-title">Add hourly leave</div><small class="helper">Use this for 1-hour, 2-hours or 4-hours leave, study leave, sick leave or TIL. This does not change the whole shift.</small><div class="hourly-grid"><div><label>Leave Type</label><select id="shiftPickerHourlyType"></select></div><div><label>Start</label><input id="shiftPickerHourlyStart" type="time" value="07:00"></div><div><label>Hours</label><select id="shiftPickerHourlyHours"><option value="1">1 hour</option><option value="2">2 hours</option><option value="4">4 hours</option></select></div></div><div class="hour-chip-row"><button type="button" class="hour-chip active" data-hours="1" onclick="selectHourlyHours(1)">1 hour leave</button><button type="button" class="hour-chip" data-hours="2" onclick="selectHourlyHours(2)">2 hours</button><button type="button" class="hour-chip" data-hours="4" onclick="selectHourlyHours(4)">4 hours</button></div><label style="margin-top:10px">Hourly Leave Notes</label><textarea class="shift-modal-note" id="shiftPickerHourlyNotes" placeholder="Optional reason / private note to Svetlana"></textarea><div class="shift-modal-actions"><button type="button" class="secondary" onclick="closeShiftPickerModal()">Cancel</button><button type="button" class="success" id="shiftPickerSaveFullBtn" onclick="saveShiftPickerModal()">Save full-day change</button></div><div class="shift-modal-actions" style="grid-template-columns:1fr;margin-top:10px"><button type="button" class="success" id="shiftPickerSaveHourlyBtn" onclick="saveHourlyLeaveFromModal()">Save hourly leave</button></div></div></div>`;modal.addEventListener("click",e=>{if(e.target===modal)closeShiftPickerModal();});document.body.appendChild(modal);return modal;}
    function selectHourlyHours(hours){const select=document.getElementById("shiftPickerHourlyHours");if(select)select.value=String(hours);document.querySelectorAll(".hour-chip").forEach(btn=>btn.classList.toggle("active",btn.dataset.hours===String(hours)));}
    function editRosterShift(staffId,shiftDate,currentCode){const staff=findMonthlyStaff(staffId);if(!isRosterManager()&&!currentUserMatchesStaffRow(staff)){showError("You can only book leave or hourly leave for your own row.");return;}openShiftPicker(staffId,shiftDate,currentCode||"");}
    function openShiftPicker(staffId,shiftDate,currentCode){clearMessage();const staff=findMonthlyStaff(staffId),cleanCurrent=normaliseRosterCode(currentCode||"");const manage=isRosterManager();const defaultCode=manage?(cleanCurrent&&cleanCurrent!=="LL"?cleanCurrent:"D"):(SW4_REQUEST_CHOICES.some(x=>x.code===cleanCurrent)?cleanCurrent:"L");shiftPickerState={staffId,shiftDate,currentCode:cleanCurrent,selectedCode:defaultCode,manage,staff};const modal=ensureShiftPickerModal();const staffName=cleanStaffName(staff?.full_name||"Staff member"),role=labelRole(staff?.role||"");document.getElementById("shiftPickerTitle").textContent=manage?"Update Shift / Add Hourly Leave":"Book Leave / Add Hourly Leave";document.getElementById("shiftPickerSubtitle").innerHTML=`${escapeHtml(staffName)}${role?` — ${escapeHtml(role)}`:""}<br>${escapeHtml(formatDate(shiftDate))}`;document.getElementById("shiftFullDayHeading").textContent=manage?"Full-day change":"Full-day request";document.getElementById("shiftPickerNoteLabel").textContent=manage?"Notes for full-day change (optional)":"Private note to Svetlana (optional)";document.getElementById("shiftPickerNotes").placeholder=manage?"Any notes...":"Reason / private note to Svetlana";document.getElementById("shiftPickerHourlyNotes").placeholder="Optional reason / private note to Svetlana";document.getElementById("shiftPickerNotes").value="";document.getElementById("shiftPickerHourlyNotes").value="";document.getElementById("shiftPickerHourlyStart").value="07:00";populateHourlyTypeOptions();selectHourlyHours(1);renderShiftPickerChoices();document.getElementById("shiftPickerSaveFullBtn").textContent=manage?"Save full-day change":"Send full-day request";document.getElementById("shiftPickerSaveHourlyBtn").textContent="Save hourly leave";modal.classList.remove("hidden");}

    function selectShiftPickerCode(code){if(!shiftPickerState)return;shiftPickerState.selectedCode=normaliseRosterCode(code);renderShiftPickerChoices();}
    function closeShiftPickerModal(){const modal=document.getElementById("shiftPickerBackdrop");if(modal)modal.classList.add("hidden");shiftPickerState=null;}
    async function saveShiftPickerModal(){if(!shiftPickerState){closeShiftPickerModal();return;}const state=shiftPickerState,chosen=normaliseRosterCode(state.selectedCode),current=normaliseRosterCode(state.currentCode),notes=document.getElementById("shiftPickerNotes")?.value?.trim()||null;if(!chosen){showError("Choose a value.");return;}if(chosen==="LL"){showError("Long Leave is automatic and is no longer selectable from the legend.");return;}if(state.manage){closeShiftPickerModal();if(chosen===current)return;const storedCode=storeRosterCode(chosen);const{error}=await sb.rpc("upsert_ward_roster_override",{p_ward_id:appState.selectedWardId,p_staff_id:state.staffId,p_shift_date:state.shiftDate,p_shift_code:storedCode,p_override_reason:reasonForShift(storedCode),p_notes:notes});if(error){showError(error.message);return;}showSuccess("Roster status updated.");await renderMonthlyRoster();return;}const{error}=await sb.rpc("submit_sw4_leave_request",{p_request_date:state.shiftDate,p_request_code:chosen,p_is_hourly:false,p_start_time:null,p_hours:null,p_staff_note:notes});if(error){showError(error.message);return;}closeShiftPickerModal();showSuccess("Leave request sent to Svetlana for approval.");if(appState.activeTab==="leaveTil")await renderLeaveTil();}

    async function decideSw4LeaveRequest(requestId,decision){clearMessage();const approverNote=document.getElementById(`approverNote_${requestId}`)?.value?.trim()||null;const{error}=await sb.rpc("decide_sw4_leave_request",{p_request_id:requestId,p_decision:decision,p_approver_note:approverNote});if(error){showError(error.message);return;}showSuccess(decision==="approved"?"Request approved.":"Request rejected.");await renderLeaveTil();}

<script>
  /* --- SW4 v4 monthly roster legend + pending/approved leave overlay --- */
  (function(){
    const originalBuildTabs = window.buildTabs;
    window.buildTabs = function(){
      const tabsEl=document.getElementById("tabs");
      if(!tabsEl) return;
      tabsEl.innerHTML=getTabs().map(([key,label])=>`<button type="button" class="tab ${appState.activeTab===key?"active":""}" onclick="renderTab('${key}')"><span>${escapeHtml(label)}</span></button>`).join("");
    };
  })();
  function normaliseRosterCode(code){const raw=String(code||"").trim().toUpperCase();if(!raw||raw==="—"||raw==="-")return"";const aliases={A:"L",AL:"L",ANNUAL:"L",ANNUAL_LEAVE:"L",LEAVE:"L",S:"SL",SICK:"SL",SICK_LEAVE:"SL",MATERNITY:"ML",MATERNITY_LEAVE:"ML",STUDY:"ST",STUDY_LEAVE:"ST",TILIN:"TI",TIL_IN:"TI",TILOUT:"TO",TIL_OUT:"TO",OVERTIME:"OT",VACATION:"VL",VACATION_LEAVE:"VL",PENDING:"PL",PENDING_LEAVE:"PL",APPROVED:"APP",APPROVED_LEAVE:"APP",LONG_LEAVE:"LL"};return aliases[raw]||raw;}
  function shiftLabel(code){const labels={D:"Day",N:"Night",O:"Off",R:"Rest",L:"Leave",AL:"Leave",SL:"Sick Leave",ML:"Maternity",ST:"Study",TI:"TIL In",TO:"TIL Out",OT:"Overtime",VL:"Vacation Leave",PL:"Pending Leave",APP:"Approved Leave",ALV:"Approved Leave",LL:"Long Leave",M:"Morning",E:"Evening"};const clean=normaliseRosterCode(code);return labels[clean]||clean||"";}
  function shiftBadge(code){const cleanCode=normaliseRosterCode(code||"");if(!cleanCode)return`<span class="shift-cell shift-O">—</span>`;return`<span class="shift-cell shift-${escapeHtml(cleanCode)}" title="${escapeHtml(displayShiftCode(cleanCode))} — ${escapeHtml(shiftLabel(cleanCode))}">${escapeHtml(displayShiftCode(cleanCode))}</span>`;}
  function displayShiftCode(code){const clean=normaliseRosterCode(code);if(clean==="APP")return"AL";return clean||"—";}
  function leaveOverlayDisplayCode(map, staffId, isoDate, fallbackCode){const key=`${staffId}|${isoDate}`;const row=map[key];if(!row)return fallbackCode;const status=String(row.status||"").toLowerCase();if(status==="pending")return"PL";if(status==="approved")return"APP";return fallbackCode;}
  async function loadLeaveStatusMapForMonth(start,end){const out={};try{const res=await sb.rpc("get_sw4_leave_roster_statuses",{p_start_date:start,p_end_date:end});if(res.error)throw res.error;for(const row of (res.data||[])){out[`${row.staff_id}|${row.request_date}`]=row;}return out;}catch(err){console.warn("Leave overlay not loaded",err);return out;}}
  async function renderMonthlyRoster(){const wardId=requireSelectedWard();const monthValue=appState.selectedMonth;const{start,end,days}=monthRange(monthValue);const selectedW=selectedWard();const[rosterResult,holidayResult,leaveMap]=await Promise.all([sb.rpc("get_my_ward_roster_between",{p_ward_id:wardId,p_start_date:start,p_end_date:end}),sb.rpc("get_malta_public_holidays",{p_start_date:start,p_end_date:end}),loadLeaveStatusMapForMonth(start,end)]);if(rosterResult.error)throw rosterResult.error;if(holidayResult.error)throw holidayResult.error;const grouped=groupRosterByStaff(rosterResult.data||[]),holidays=holidayResult.data||[];appState.monthlyRosterRows=grouped;const holidayMap={};for(const h of holidays)holidayMap[h.holiday_date]=h;document.getElementById("content").innerHTML=`<div class="card roster-hero"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>Monthly Roster</h2><h1>${escapeHtml(selectedW?.ward_name||"Selected Ward")}</h1><p class="muted">${escapeHtml(selectedW?.ward_code||"")} · ${escapeHtml(monthLabel(monthValue))} · Click your own cell to book leave, or update shifts if authorised.</p></div><div class="roster-nav">${wardSelectorHtml()}<div><label>Month</label><input type="month" value="${monthValue}" onchange="setSelectedMonth(this.value)"></div><div><label>Jump to date</label><input id="rosterJumpDate" type="date"></div><button class="secondary" type="button" onclick="jumpRosterDate()">Jump</button><button class="secondary" type="button" onclick="changeRosterMonth(-1)">← Prev</button><button class="secondary" type="button" onclick="goRosterToday()">Today</button><button class="secondary" type="button" onclick="changeRosterMonth(1)">Next →</button></div></div></div><div class="card"><div class="legend-compact">${legend("D","Day")}${legend("N","Night")}${legend("O","Off")}${legend("R","Rest")}${legend("PL","Pending Leave")}${legend("APP","Approved Leave")}${legend("L","Leave")}${legend("SL","Sick Leave")}${legend("ML","Maternity")}${legend("ST","Study")}${legend("TI","TIL In")}${legend("TO","TIL Out")}${legend("OT","Overtime")}${legend("VL","Vacation Leave")}</div></div><div class="card roster-table-card"><div class="table-wrap roster-table-wrap"><table class="roster-table"><thead><tr><th>Staff Member</th>${days.map(d=>{const key=isoFromDate(d),h=holidayMap[key];return `<th class="${h?"holiday-col":""} ${key===todayISO()?"today-col":""}"><div class="day-head"><span>${weekdayShort(d)}</span><span>${d.getDate()}</span>${h?`<span class="holiday-label" title="${escapeHtml(h.holiday_name)}">${escapeHtml(h.short_label||h.holiday_name)}</span>`:""}</div></th>`;}).join("")}</tr></thead><tbody>${grouped.map(staff=>`<tr><td><span class="staff-name-line">${escapeHtml(cleanStaffName(staff.full_name))}</span><span class="staff-role-line">${escapeHtml(labelRole(staff.role))}</span><span class="staff-shift-line">${escapeHtml(staffRosterLabel(staff))}</span></td>${days.map(day=>{const key=isoFromDate(day),r=staff.days[key],actualCode=r?.live_shift_code||"",baseDisplay=longLeaveDisplayCode(staff.days,key,actualCode),displayCode=leaveOverlayDisplayCode(leaveMap,staff.staff_id,key,baseDisplay),h=holidayMap[key];return `<td class="${h?"holiday-col":""} ${key===todayISO()?"today-col":""}">${shiftButton(staff.staff_id,key,displayCode,r?.source_type==="override",actualCode)}</td>`;}).join("")}</tr>`).join("")||`<tr><td colspan="${days.length+1}" class="muted">No core roster rows found for this ward/month.</td></tr>`}</tbody></table></div></div>`;}
</script>


<script>
  /* =========================================================
     SW4 v5 — Permissions cleanup
     - Hide My Ward Staff from non-charge staff.
     - Stop red warning on normal roster view.
     - Make non-own roster cells read-only for normal staff.
     - Keep Charge Nurse leave private from non-manager staff.
     Frontend-only change. No Supabase SQL required.
     ========================================================= */

  function sw4CanManageStaff(){
    return isRosterManager();
  }

  function sw4IsChargeOrManager(){
    return appState.profile?.role === "charge_nurse" || !!appState.profile?.is_system_admin;
  }

  function sw4IsChargeNurseRow(staff){
    return String(staff?.role || "").toLowerCase() === "charge_nurse";
  }

  function sw4IsPrivateLeaveCode(code){
    const clean = normaliseRosterCode(code);
    return ["L","AL","SL","ML","ST","TI","TO","OT","VL","PL","APP","ALV","LL"].includes(clean);
  }

  function sw4ReadOnlyShiftBadge(code, titleText){
    const clean = normaliseRosterCode(code || "");
    const visual = clean || "O";
    const label = titleText || `${displayShiftCode(visual)} — ${shiftLabel(visual)}`;
    return `<span class="shift-cell shift-${escapeHtml(visual)}" title="${escapeHtml(label)}">${escapeHtml(displayShiftCode(visual))}</span>`;
  }

  function sw4PrivateShiftBadge(){
    return `<span class="shift-cell shift-O" title="Private Charge Nurse leave information">—</span>`;
  }

  getTabs = function(){
    const tabs = [["monthlyRoster","Monthly Roster"],["leaveTil","Leave, TIL & OT"]];

    if (sw4CanManageStaff()) {
      tabs.push(["staffManagement","My Ward Staff"]);
      tabs.push(["auditVisuals","Audit KPIs"],["auditHistory","Audit History"]);
    }

    tabs.push(["myAccount","My Account"]);
    return tabs;
  };

  renderTab = async function(tabKey){
    if (tabKey === "staffManagement" && !sw4CanManageStaff()) {
      tabKey = "monthlyRoster";
    }

    if ((tabKey === "auditVisuals" || tabKey === "auditHistory") && !sw4CanManageStaff()) {
      tabKey = "monthlyRoster";
    }

    appState.activeTab = tabKey;
    buildTabs();
    clearMessage();
    document.getElementById("content").innerHTML = `<div class="card"><p class="muted">Loading...</p></div>`;

    try {
      if (tabKey === "monthlyRoster") await renderMonthlyRoster();
      else if (tabKey === "leaveTil") await renderLeaveTil();
      else if (tabKey === "staffManagement") await renderStaffManagement();
      else if (tabKey === "auditVisuals") await renderAuditVisuals();
      else if (tabKey === "auditHistory") await renderAuditHistory();
      else if (tabKey === "myAccount") await renderMyAccount();
      else await renderMonthlyRoster();
    } catch (err) {
      showError(err.message || String(err));
    }
  };

  editRosterShift = function(staffId, shiftDate, currentCode){
    const staff = findMonthlyStaff(staffId);

    if (!isRosterManager() && !currentUserMatchesStaffRow(staff)) {
      clearMessage();
      return;
    }

    openShiftPicker(staffId, shiftDate, currentCode || "");
  };

  shiftButton = function(staffId, shiftDate, code, isOverride, actualCode = null){
    const staff = findMonthlyStaff(staffId);
    const cleanCode = normaliseRosterCode(code || actualCode || "");
    const visualCode = cleanCode || "O";
    const storedCode = normaliseRosterCode(actualCode || code || "");
    const canEditThisCell = isRosterManager() || currentUserMatchesStaffRow(staff);

    if (!sw4IsChargeOrManager() && sw4IsChargeNurseRow(staff) && sw4IsPrivateLeaveCode(visualCode)) {
      return sw4PrivateShiftBadge();
    }

    if (!canEditThisCell) {
      return `${sw4ReadOnlyShiftBadge(visualCode, "Read-only roster cell")}${isOverride ? `<span class="override-dot" title="Changed from baseline"></span>` : ""}`;
    }

    return `<button type="button" class="shift-cell shift-${escapeHtml(visualCode)}" onclick="editRosterShift('${escapeHtml(staffId)}','${escapeHtml(shiftDate)}','${escapeHtml(storedCode)}')" title="Click to update: ${escapeHtml(displayShiftCode(visualCode))} — ${escapeHtml(shiftLabel(visualCode))}">${escapeHtml(displayShiftCode(visualCode))}</button>${isOverride ? `<span class="override-dot" title="Changed from baseline"></span>` : ""}`;
  };

  renderStaffManagement = async function(){
    if (!sw4CanManageStaff()) {
      document.getElementById("content").innerHTML = `<div class="card"><div class="info">My Ward Staff is available only to Charge Nurses or authorised managers.</div></div>`;
      return;
    }

    const wardId = requireSelectedWard();
    const {data,error} = await sb.rpc("get_ward_staff_members",{p_ward_id:wardId});
    if (error) throw error;

    appState.staffRows = (data || []).slice().sort((a,b)=>{
      const rd = roleSortOrder(a.role) - roleSortOrder(b.role);
      return rd !== 0 ? rd : cleanStaffName(a.full_name).localeCompare(cleanStaffName(b.full_name));
    });

    document.getElementById("content").innerHTML =
      `<div class="card"><div class="actions" style="justify-content:space-between"><div><h2>My Ward Staff</h2><p class="muted">Charge Nurse staff management for Surgical Ward 4.</p></div><div>${wardSelectorHtml()}</div></div></div>
      <div class="card"><h3>Add staff member</h3><div class="grid grid-3">
        <div><label>Full name</label><input id="newStaffName" placeholder="Surname Name"></div>
        <div><label>Corp user ID</label><input id="newStaffCorp" placeholder="e.g. BorgA123"></div>
        <div><label>Email</label><input id="newStaffEmail" type="email" placeholder="name@gov.mt"></div>
        <div><label>Role</label>${roleSelectHtml("newStaffRole")}</div>
        <div><label>Shift</label>${rosterAssignmentSelectHtml("newStaffRosterAssignment")}</div>
        <div><label>Roster start date</label><input id="newStaffStartDate" type="date"></div>
      </div><div style="margin-top:14px"><button type="button" onclick="addStaffMember()">Add staff member</button></div></div>
      <div id="editStaffPanel" class="card hidden"><div class="actions" style="justify-content:space-between"><div><h3>Edit staff member</h3><p class="muted">Charge Nurses can manage ward staff. System administrator access remains hidden from normal staff views.</p></div><button type="button" class="secondary small" onclick="cancelEditStaff()">Close</button></div><input id="editStaffId" type="hidden"><div class="grid grid-3">
        <div><label>Full name</label><input id="editStaffName"></div>
        <div><label>Corp user ID</label><input id="editStaffCorp"></div>
        <div><label>Email</label><input id="editStaffEmail" type="email"></div>
        <div><label>Role</label>${roleSelectHtml("editStaffRole")}</div>
        <div><label>Shift</label>${rosterAssignmentSelectHtml("editStaffRosterAssignment")}</div>
        <div><label>Roster start date</label><input id="editStaffStartDate" type="date"></div>
      </div><div class="actions" style="margin-top:14px"><button type="button" onclick="updateStaffMember()">Save changes</button><button type="button" class="secondary" onclick="cancelEditStaff()">Cancel</button></div></div>
      <div class="card"><h3>Current staff</h3><div class="table-wrap"><table><thead><tr><th>Name</th><th>Corp ID</th><th>Role</th><th>Shift</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${appState.staffRows.map(s=>`<tr><td><strong>${escapeHtml(cleanStaffName(s.full_name))}</strong></td><td>${escapeHtml(s.corp_user_id||"—")}</td><td>${escapeHtml(labelRole(s.role))}</td><td>${escapeHtml(staffRosterLabel(s))}</td><td>${truthy(s.is_active)?badge("Active","green"):badge("Inactive","grey")}</td><td><div class="actions"><button type="button" class="secondary small" onclick="startEditStaff('${escapeHtml(s.id||s.staff_id)}')">Edit</button>${canShowDeactivateButton(s)?`<button type="button" class="danger small" onclick="deactivateStaffMember('${escapeHtml(s.id||s.staff_id)}','${escapeHtml(cleanStaffName(s.full_name))}')">Delete</button>`:`<span class="muted">Protected</span>`}</div></td></tr>`).join("") || `<tr><td colspan="6" class="muted">No staff found.</td></tr>`}
      </tbody></table></div></div>`;
  };

  const originalShowAppForSw4V5 = showApp;
  showApp = function(){
    originalShowAppForSw4V5();
    const validTabs = getTabs().map(t => t[0]);
    if (!validTabs.includes(appState.activeTab)) {
      appState.activeTab = "monthlyRoster";
      buildTabs();
    }
  };
</script>

<script>
  /* =========================================================
     SW4 v6 — final workflow overrides
     ========================================================= */

  function sw4IsFullControl(){
    const name=String(appState.profile?.full_name||"").trim().toLowerCase();
    const email=String(appState.profile?.email||"").trim().toLowerCase();
    return name==="svetlana fenech" || email==="svetlana.fenech@gov.mt" || email==="jason.fenech@gov.mt" || !!appState.profile?.is_system_admin;
  }

  isRosterManager = function(){ return sw4IsFullControl(); };
  isLeaveApprover = function(){ return sw4IsFullControl(); };
  sw4CanManageStaff = function(){ return sw4IsFullControl(); };
  sw4IsChargeOrManager = function(){ return appState.profile?.role === "charge_nurse" || sw4IsFullControl(); };

  function sw4RequestChoices(){
    return [
      {code:"L",label:"Leave"},
      {code:"SL",label:"Sick Leave"},
      {code:"TI",label:"TIL In"},
      {code:"TO",label:"TIL Out"},
      {code:"OT",label:"Overtime"},
      {code:"ML",label:"Maternity Leave"},
      {code:"ST",label:"Study Leave"}
    ];
  }
  function sw4ManagerChoices(){
    return [
      {code:"D",label:"Day"},{code:"N",label:"Night"},{code:"O",label:"Off"},{code:"R",label:"Rest"},
      {code:"L",label:"Leave"},{code:"SL",label:"Sick Leave"},{code:"TI",label:"TIL In"},{code:"TO",label:"TIL Out"},
      {code:"OT",label:"Overtime"},{code:"ML",label:"Maternity Leave"},{code:"ST",label:"Study Leave"}
    ];
  }
  function sw4TimeOptions(selected="07:00", stepMinutes=30){
    const opts=[];
    for(let h=0;h<24;h++){
      for(let m=0;m<60;m+=stepMinutes){
        const value=`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
        opts.push(`<option value="${value}" ${value===selected?"selected":""}>${value}</option>`);
      }
    }
    return opts.join("");
  }
  function sw4HourOptions(selected=1,maxHours=24){
    const value=Number(selected||1);
    const cap=Math.max(1,Number(maxHours||24));
    let html="";
    for(let h=1;h<=cap;h++) html += `<option value="${h}" ${h===value?"selected":""}>${h} hour${h===1?"":"s"}</option>`;
    return html;
  }
  function sw4DateLabel(iso){return `${formatDate(iso)}${iso?` (${new Date(iso).toLocaleDateString("en-GB",{weekday:"short"})})`:""}`;}
  function monthNumberFromIsoMonth(value){return Number(String(value||monthISO(new Date())).slice(5,7)||1);}
  function yearNumberFromIsoMonth(value){return Number(String(value||monthISO(new Date())).slice(0,4)||new Date().getFullYear());}
  function sw4MonthDropdownOptions(selected=1){
    const names=["January","February","March","April","May","June","July","August","September","October","November","December"];
    return names.map((name,idx)=>`<option value="${String(idx+1).padStart(2,"0")}" ${Number(selected)===(idx+1)?"selected":""}>${name}</option>`).join("");
  }
  function sw4YearDropdownOptions(selected){
    const current=new Date().getFullYear();
    const chosen=Number(selected||current);
    const start=Math.min(current-2,chosen-2),end=Math.max(current+5,chosen+2);
    let html="";
    for(let y=start;y<=end;y++) html += `<option value="${y}" ${y===chosen?"selected":""}>${y}</option>`;
    return html;
  }
  function setSelectedMonthPart(monthPart){
    const y=String(yearNumberFromIsoMonth(appState.selectedMonth));
    appState.selectedMonth=`${y}-${String(monthPart).padStart(2,"0")}`;
    renderTab(appState.activeTab);
  }
  function setSelectedYearPart(yearPart){
    const m=String(monthNumberFromIsoMonth(appState.selectedMonth)).padStart(2,"0");
    appState.selectedMonth=`${yearPart}-${m}`;
    renderTab(appState.activeTab);
  }

  normaliseRosterCode = function(code){
    const raw=String(code||"").trim().toUpperCase();
    if(!raw||raw==="—"||raw==="-")return"";
    const aliases={A:"L",AL:"L",ANNUAL:"L",ANNUAL_LEAVE:"L",LEAVE:"L",S:"SL",SICK:"SL",SICK_LEAVE:"SL",MATERNITY:"ML",MATERNITY_LEAVE:"ML",STUDY:"ST",STUDY_LEAVE:"ST",TILIN:"TI",TIL_IN:"TI",TILOUT:"TO",TIL_OUT:"TO",OVERTIME:"OT",VACATION:"VL",VACATION_LEAVE:"VL",PENDING:"PL",PENDING_LEAVE:"PL",APPROVED:"APP",APPROVED_LEAVE:"APP",ALV:"APP",LONG_LEAVE:"L",LL:"L",COD_ON:"CODON",COD_OFF:"CODOFF"};
    return aliases[raw]||raw;

  function kpiCounts(bundle){const monthLeave=kpiMonthLeaveRows(bundle).filter(r=>["approved","pending"].includes(String(r.status||"").toLowerCase()));const roster=bundle.roster||[];return{leave:monthLeave.filter(r=>["L","VL"].includes(normaliseRosterCode(r.request_code))).length,sick:monthLeave.filter(r=>normaliseRosterCode(r.request_code)==="SL").length,tilIn:monthLeave.filter(r=>normaliseRosterCode(r.request_code)==="TI").length,tilOut:monthLeave.filter(r=>normaliseRosterCode(r.request_code)==="TO").length,til:monthLeave.filter(r=>["TI","TO"].includes(normaliseRosterCode(r.request_code))).length,otRequests:monthLeave.filter(r=>normaliseRosterCode(r.request_code)==="OT").length,otRoster:roster.filter(r=>normaliseRosterCode(r.live_shift_code)==="OT").length,maternity:monthLeave.filter(r=>normaliseRosterCode(r.request_code)==="ML").length,study:monthLeave.filter(r=>normaliseRosterCode(r.request_code)==="ST").length,pending:monthLeave.filter(r=>String(r.status||"").toLowerCase()==="pending").length,invitesPending:(bundle.invites||[]).filter(r=>String(r.status||"").toLowerCase()==="pending").length,codPending:(bundle.cod||[]).filter(r=>String(r.status||"").toLowerCase()==="pending").length};}
  function renderDailySummaryTable(bundle){const byDate=kpiDailyMap(bundle);return `<div class="table-wrap"><table class="kpi-small-table kpi-summary-table"><thead><tr><th>Date</th><th>Leave</th><th>Sick</th><th>TIL In</th><th>TIL Out</th><th>Overtime</th><th>Maternity</th><th>Study</th><th>Pending</th><th>Total</th></tr></thead><tbody>${bundle.days.map(d=>{const key=isoFromDate(d),x=byDate[key],cls=x.total>=4?"kpi-total-warn":x.total>=2?"kpi-total-strong":"";return `<tr><td><strong>${d.getDate()} ${weekdayShort(d)}</strong></td><td>${x.leave}</td><td>${x.sick}</td><td>${x.tilIn}</td><td>${x.tilOut}</td><td>${x.ot}</td><td>${x.maternity}</td><td>${x.study}</td><td>${x.pending}</td><td class="${cls}">${x.total}</td></tr>`;}).join("")}</tbody></table></div>`;}
  function renderTopDaysTable(bundle){const byDate=kpiDailyMap(bundle);const rows=bundle.days.map(d=>{const key=isoFromDate(d),x=byDate[key];return {label:`${d.getDate()} ${weekdayShort(d)}`,leave:x.leave,sick:x.sick,til:x.til,ot:x.ot,pending:x.pending,total:x.total};}).sort((a,b)=>b.total-a.total||b.pending-a.pending||b.leave-a.leave).slice(0,8);return `<div class="table-wrap"><table class="kpi-small-table kpi-summary-table"><thead><tr><th>Day</th><th>Leave</th><th>Sick</th><th>TIL</th><th>OT</th><th>Pending</th><th>Total</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${escapeHtml(r.label)}</strong></td><td>${r.leave}</td><td>${r.sick}</td><td>${r.til}</td><td>${r.ot}</td><td>${r.pending}</td><td class="${r.total>=4?"kpi-total-warn":"kpi-total-strong"}">${r.total}</td></tr>`).join("")||`<tr><td colspan="7" class="muted">No activity this month yet.</td></tr>`}</tbody></table></div>`;}
  function kpiTypeTotals(bundle){const rows=kpiMonthLeaveRows(bundle);const summary={leave:{label:"Leave",approved:0,pending:0},sick:{label:"Sick Leave",approved:0,pending:0},tilIn:{label:"TIL In",approved:0,pending:0},tilOut:{label:"TIL Out",approved:0,pending:0},overtime:{label:"Overtime",approved:0,pending:0},maternity:{label:"Maternity",approved:0,pending:0},study:{label:"Study",approved:0,pending:0}};for(const r of rows){const st=String(r.status||"").toLowerCase();if(!["approved","pending"].includes(st))continue;const code=normaliseRosterCode(r.request_code);let key=null;if(["L","VL"].includes(code))key="leave";else if(code==="SL")key="sick";else if(code==="TI")key="tilIn";else if(code==="TO")key="tilOut";else if(code==="OT")key="overtime";else if(code==="ML")key="maternity";else if(code==="ST")key="study";if(key)summary[key][st]++;}return Object.values(summary).map(x=>({...x,total:x.approved+x.pending}));}
  function renderKpiTypeSummary(bundle){const rows=kpiTypeTotals(bundle);return `<div class="table-wrap"><table class="kpi-small-table kpi-summary-table"><thead><tr><th>Category</th><th>Approved</th><th>Pending</th><th>Total</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${escapeHtml(r.label)}</strong></td><td>${r.approved}</td><td>${r.pending}</td><td class="kpi-total-strong">${r.total}</td></tr>`).join("")}</tbody></table></div>`;}
  function renderKpiStaffSummary(bundle){const map=new Map();for(const r of kpiMonthLeaveRows(bundle)){const name=cleanStaffName(r.staff_full_name||r.full_name||"Unknown");if(!map.has(name))map.set(name,{name,leave:0,sick:0,til:0,ot:0,pending:0,total:0});const row=map.get(name);const code=normaliseRosterCode(r.request_code);const st=String(r.status||"").toLowerCase();if(st==="pending")row.pending++;if(!["approved","pending"].includes(st))continue;if(["L","VL","ML","ST"].includes(code))row.leave++;if(code==="SL")row.sick++;if(["TI","TO"].includes(code))row.til++;if(code==="OT")row.ot++;row.total=row.leave+row.sick+row.til+row.ot+row.pending;}const rows=Array.from(map.values()).sort((a,b)=>b.total-a.total||a.name.localeCompare(b.name));return `<div class="table-wrap"><table class="kpi-small-table kpi-summary-table"><thead><tr><th>Staff member</th><th>Leave</th><th>Sick</th><th>TIL</th><th>Overtime</th><th>Pending</th><th>Total</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${escapeHtml(r.name)}</strong></td><td>${r.leave}</td><td>${r.sick}</td><td>${r.til}</td><td>${r.ot}</td><td>${r.pending}</td><td class="kpi-total-strong">${r.total}</td></tr>`).join("")||`<tr><td colspan="7" class="muted">No staff activity for this month yet.</td></tr>`}</tbody></table></div>`;}
  async function renderOvertimePlanning(){const date=appState.kpiPlanningDate||todayISO();const wardId=requireSelectedWard();const roster=await sb.rpc("get_my_ward_roster_between",{p_ward_id:wardId,p_start_date:date,p_end_date:date});if(roster.error)throw roster.error;const rows=(roster.data||[]).filter(r=>["O","R"].includes(normaliseRosterCode(r.live_shift_code||r.baseline_shift_code))).sort((a,b)=>roleSortOrder(a.role)-roleSortOrder(b.role)||cleanStaffName(a.full_name).localeCompare(cleanStaffName(b.full_name)));return `<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-end"><div><h3>Overtime planning</h3><p class="muted">Choose a date, view staff who are Off or Rest, and send a day or night overtime invite.</p></div><div><label>Date</label><input type="date" value="${date}" onchange="setKpiPlanningDate(this.value)"></div></div><div class="grid grid-4" style="margin-top:12px"><div><label>Shift</label><select id="otInviteShift"><option value="day" selected>Day (07:00)</option><option value="night">Night (19:00)</option></select></div><div><label>Hours</label><select id="otInviteHours">${sw4HourOptions(8,8)}</select></div><div><label>Note</label><input id="otInviteNote" placeholder="Optional note for nurse"></div><div><label>Start time</label><input id="otInviteStartDisplay" value="07:00" readonly></div></div><div class="table-wrap" style="margin-top:12px"><table class="kpi-small-table"><thead><tr><th>Available staff</th><th>Role</th><th>Current shift</th><th>Action</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${escapeHtml(cleanStaffName(r.full_name))}</strong></td><td>${escapeHtml(labelRole(r.role))}</td><td>${shiftBadge(r.live_shift_code||r.baseline_shift_code)}</td><td><button type="button" class="small success" onclick="sendSw4OvertimeInvite('${escapeHtml(r.staff_id)}','${escapeHtml(date)}')">Send overtime invite</button></td></tr>`).join("")||`<tr><td colspan="4" class="muted">No staff currently marked Off or Rest on this date.</td></tr>`}</tbody></table></div></div>`;}
  async function sendSw4OvertimeInvite(staffId,date){clearMessage();const shiftType=document.getElementById("otInviteShift")?.value||"day";const start=shiftType==="night"?"19:00":"07:00";const hours=Number(document.getElementById("otInviteHours")?.value||8);const note=document.getElementById("otInviteNote")?.value?.trim()||null;const{error}=await sb.rpc("create_sw4_overtime_invite",{p_staff_id:staffId,p_invite_date:date,p_start_time:start,p_hours:hours,p_manager_note:note});if(error){showError(error.message);return;}showSuccess("Overtime invite sent.");await renderAuditVisuals();}
  renderAuditVisuals = async function(){if(!sw4IsFullControl()){document.getElementById("content").innerHTML=`<div class="card"><div class="info">KPI Planning is available only to Svetlana Fenech or the hidden system administrator.</div></div>`;return;}const view=appState.kpiPlanningView||"monthly";const bundle=await loadKpiPlanningBundle();const c=kpiCounts(bundle);let body="";if(view==="monthly")body=`<div class="stat-grid">${statCard(c.leave,"Leave")}${statCard(c.sick,"Sick Leave")}${statCard(c.til,"TIL In / Out")}${statCard(c.otRoster+c.otRequests,"Overtime")}</div><div class="grid grid-2"><div class="card"><h3>Top activity days this month</h3><p class="muted">Simple view of the busiest days for leave, sick leave, TIL, overtime and pending requests.</p>${renderTopDaysTable(bundle)}</div><div class="card"><h3>Action summary</h3><table class="kpi-small-table kpi-summary-table"><tbody><tr><td>Pending leave / TIL / overtime requests</td><td><strong>${c.pending}</strong></td></tr><tr><td>Pending overtime invites</td><td><strong>${c.invitesPending}</strong></td></tr><tr><td>Pending Change of Duty records</td><td><strong>${c.codPending}</strong></td></tr><tr><td>Maternity requests this month</td><td><strong>${c.maternity}</strong></td></tr><tr><td>Study requests this month</td><td><strong>${c.study}</strong></td></tr></tbody></table></div></div><div class="card"><h3>Monthly totals by category</h3>${renderKpiTypeSummary(bundle)}</div>`;else if(view==="totals")body=`<div class="grid grid-2"><div class="card"><h3>Monthly totals by category</h3><p class="muted">Approved and pending requests for the selected month.</p>${renderKpiTypeSummary(bundle)}</div><div class="card"><h3>Staff summary for the month</h3><p class="muted">Useful to see who has the highest leave, sick leave, TIL or overtime activity this month.</p>${renderKpiStaffSummary(bundle)}</div></div>`;else if(view==="daily")body=`<div class="card"><h3>Daily summary</h3><p class="muted">A simple day-by-day list for the selected month. This replaces the old “daily pressure” wording.</p>${renderDailySummaryTable(bundle)}</div>`;else if(view==="overtime")body=await renderOvertimePlanning();else body=`<div class="grid grid-2"><div class="card"><h3>Pending leave / TIL / overtime requests</h3>${kpiMonthLeaveRows(bundle).filter(r=>String(r.status||"").toLowerCase()==="pending").map(r=>`<div class="invite-card pending"><strong>${escapeHtml(cleanStaffName(r.staff_full_name||r.full_name||""))}</strong><br><span class="muted">${escapeHtml(formatDate(r.request_date))} · ${escapeHtml(requestSummaryText(r))}</span></div>`).join("")||`<div class="info">No pending leave/TIL/overtime requests.</div>`}</div><div class="card"><h3>Pending overtime invites</h3>${(bundle.invites||[]).filter(r=>String(r.status||"").toLowerCase()==="pending").map(r=>overtimeInviteCard(r,"manager")).join("")||`<div class="info">No pending overtime invites.</div>`}</div></div>`;document.getElementById("content").innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>KPI Planning</h2><h1>Surgical Ward 4</h1><p class="muted">Planning dashboard for Svetlana: clearer monthly totals, daily summaries, overtime planning and pending actions.</p>${kpiNav(view)}</div><div class="kpi-filter-row"><div><label>Month</label><select onchange="setSelectedMonthPart(this.value)">${sw4MonthDropdownOptions(monthNumberFromIsoMonth(appState.selectedMonth))}</select></div><div><label>Year</label><select onchange="setSelectedYearPart(this.value)">${sw4YearDropdownOptions(yearNumberFromIsoMonth(appState.selectedMonth))}</select></div></div></div></div>${body}`;setTimeout(()=>{const shift=document.getElementById("otInviteShift"),display=document.getElementById("otInviteStartDisplay");if(shift&&display){const sync=()=>display.value=shift.value==="night"?"19:00":"07:00";shift.onchange=sync;sync();}},0);};

  async function loadSw4StaffOptions(){if(appState.staffRows&&appState.staffRows.length)return appState.staffRows;const wardId=requireSelectedWard();const{data,error}=await sb.rpc("get_ward_staff_members",{p_ward_id:wardId});if(error)throw error;appState.staffRows=(data||[]).slice().sort((a,b)=>roleSortOrder(a.role)-roleSortOrder(b.role)||cleanStaffName(a.full_name).localeCompare(cleanStaffName(b.full_name)));return appState.staffRows;}
  function staffSelectHtml(id,rows){return `<select id="${id}"><option value="">— Select —</option>${rows.map(s=>`<option value="${escapeHtml(s.id||s.staff_id)}">${escapeHtml(cleanStaffName(s.full_name))} — ${escapeHtml(labelRole(s.role))}</option>`).join("")}</select>`;}
  function dateOptionsHtml(dates,selected=""){return `<option value="">— Select —</option>${dates.map(d=>`<option value="${escapeHtml(d.date)}" ${d.date===selected?"selected":""}>${escapeHtml(d.label)}</option>`).join("")}`;}
  function monthDateOptions(){const {days}=monthRange(appState.selectedMonth);return days.map(d=>({date:isoFromDate(d),label:sw4DateLabel(isoFromDate(d))}));}
  function sundayOptionsForYear(year){const out=[],d=new Date(year,0,1);while(d.getDay()!==0)d.setDate(d.getDate()+1);while(d.getFullYear()===year){const iso=isoFromDate(d);out.push({date:iso,label:sw4DateLabel(iso)});d.setDate(d.getDate()+7);}return out;}
  async function holidayOptionsForYear(year){const start=`${year}-01-01`,end=`${year}-12-31`;try{const res=await sb.rpc("get_malta_public_holidays",{p_start_date:start,p_end_date:end});if(res.error)throw res.error;return (res.data||[]).map(h=>({date:h.holiday_date,label:`${formatDate(h.holiday_date)} — ${h.holiday_name||h.short_label||"Public holiday"}`}));}catch(err){console.warn(err);return[];}}
  async function createCod(type,prefix){clearMessage();const staffId=document.getElementById(`${prefix}Staff`)?.value;const off=document.getElementById(`${prefix}Off`)?.value;const worked=document.getElementById(`${prefix}Worked`)?.value;const notes=document.getElementById(`${prefix}Notes`)?.value?.trim()||null;if(!staffId||!off||!worked){showError("Choose staff member, day off and day worked instead.");return;}const{error}=await sb.rpc("create_sw4_change_of_duty",{p_staff_id:staffId,p_cod_type:type,p_off_date:off,p_worked_date:worked,p_notes:notes});if(error){showError(error.message);return;}showSuccess("Change of Duty recorded. Approved records will show on the Monthly Roster.");await renderChangeOfDuty();}

  function codTable(rows,type){const list=(rows||[]).filter(r=>String(r.cod_type||"")===type);return `<div class="table-wrap" style="margin-top:12px"><table class="kpi-small-table"><thead><tr><th>Staff</th><th>Day off</th><th>Day worked</th><th>Notes</th><th>Status</th><th>Recorded</th><th>Action</th></tr></thead><tbody>${list.map(r=>`<tr><td><strong>${escapeHtml(cleanStaffName(r.staff_full_name||r.full_name||""))}</strong></td><td>${escapeHtml(formatDate(r.off_date))}</td><td>${escapeHtml(formatDate(r.worked_date))}</td><td>${escapeHtml(r.notes||"")}</td><td>${requestStatusPill(r.status)}</td><td>${escapeHtml(shortDateTime(r.created_at)||"")}</td><td>${String(r.status||"").toLowerCase()==="pending"?`<button class="small success" onclick="decideCod('${escapeHtml(r.id)}','approved')">Approve</button> <button class="small danger" onclick="decideCod('${escapeHtml(r.id)}','rejected')">Reject</button>`:"—"}</td></tr>`).join("")||`<tr><td colspan="7" class="muted">No records.</td></tr>`}</tbody></table></div>`;}
  function codSection(title,headClass,type,prefix,staffRows,offOptions,workedOptions,rows){return `<div class="cod-section"><div class="cod-head ${headClass}">${escapeHtml(title)}</div><div class="cod-body"><div class="cod-form-grid"><div><label>Staff Member</label>${staffSelectHtml(`${prefix}Staff`,staffRows)}</div><div><label>${type==="public_holiday"?"Holiday taken off":type==="sunday"?"Sunday off":"Day off"}</label><select id="${prefix}Off">${dateOptionsHtml(offOptions)}</select></div><div><label>${type==="public_holiday"?"Holiday worked instead":type==="sunday"?"Sunday worked":"Day worked instead"}</label><select id="${prefix}Worked">${dateOptionsHtml(workedOptions)}</select></div><div><label>Notes</label><input id="${prefix}Notes" placeholder="Optional..."></div><button type="button" onclick="createCod('${type}','${prefix}')">Record</button></div>${codTable(rows,type)}</div></div>`;}
  renderChangeOfDuty = async function(){if(!sw4IsFullControl()){document.getElementById("content").innerHTML=`<div class="card"><div class="info">Change of Duty is available only to Svetlana Fenech or the hidden system administrator.</div></div>`;return;}const year=Number((appState.selectedMonth||monthISO(new Date())).slice(0,4));const monthDates=monthDateOptions();const sundays=sundayOptionsForYear(year);const holidays=await holidayOptionsForYear(year);const staffRows=await loadSw4StaffOptions();const {start,end}=monthRange(appState.selectedMonth);const rows=await sw4RpcOrEmpty("list_sw4_change_of_duty",{p_start_date:`${year}-01-01`,p_end_date:`${year}-12-31`,p_status:null});document.getElementById("content").innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>Change of Duty</h2><h1>Surgical Ward 4</h1><p class="muted">Record duty swaps. Approved changes are marked on the Monthly Roster as COD on / COD off.</p></div><div><label>Month</label><input type="month" value="${appState.selectedMonth}" onchange="setSelectedMonth(this.value)"></div></div></div>${codSection("📅 Normal Day Swap","", "normal", "normalCod", staffRows, monthDates, monthDates, rows)}${codSection("🇲🇹 Public Holiday Swap","holiday", "public_holiday", "holidayCod", staffRows, holidays, holidays, rows)}${codSection("☀️ Sunday Swap","sunday", "sunday", "sundayCod", staffRows, sundays, sundays, rows)}`;};

  const originalShowAppForSw4V6=showApp;
  showApp=function(){originalShowAppForSw4V6();const validTabs=getTabs().map(t=>t[0]);if(!validTabs.includes(appState.activeTab)){appState.activeTab="monthlyRoster";buildTabs();}};
</script>

<script>
  /* =========================================================
     SW4 v8 — final corrections requested:
     1) remove useless grey Leave from legend,
     2) approved requests are green, including TIL/OT requests,
     3) red dot only when the live roster value is truly changed from baseline.
     ========================================================= */

  displayShiftCode = function(code){
    const clean=normaliseRosterCode(code);
    if(clean==="APP")return"A";
    if(clean==="CODON")return"COD";
    if(clean==="CODOFF")return"COD";
    return clean||"—";
  };

  shiftLabel = function(code){
    const labels={
      D:"Day",N:"Night",O:"Off",R:"Rest",
      L:"Leave",AL:"Leave",
      SL:"Sick Leave",ML:"Maternity",ST:"Study",

<script>
  /* =========================================================
     SW4 v11 — Shift selector restructure
     Official user-defined roster codes for Staff Management.
     This updates the dropdown list and the roster code displayed
     on the Monthly Roster / Staff Management tables.
     ========================================================= */
  (function(){
    const SW4_ROSTER_PATTERN_OPTIONS = [
      { code:"AAOO",  label:"AAOO — Day, Day, Off, Off", description:"Example: Svetlana Fenech pattern" },
      { code:"DDNOO", label:"DDNOO — Day, Day, Night, Rest/Off", description:"Example: Clayton Turner pattern" },
      { code:"DDDOO", label:"DDDOO — Day, Day, Day, Off, Off", description:"Example: Noel Spiteri pattern" },
      { code:"AAOAO", label:"AAOAO — Day, Day, Off, Day, Off", description:"Example: Paul Savona pattern" },
      { code:"DNNOO", label:"DNNOO — Day, Night, Night, Rest/Off", description:"Example: Jessy Varghese pattern" }
    ];

    const SW4_KNOWN_STAFF_PATTERN = {
      "svetlana fenech":"AAOO",
      "clayton turner":"DDNOO",
      "noel spiteri":"DDDOO",
      "spiteri":"DDDOO",
      "paul savona":"AAOAO",
      "jessy varghese":"DNNOO",
      "jesse vargas":"DNNOO"
    };

    function sw4CleanPatternCode(value){
      const raw=String(value||"").trim().toUpperCase().replace(/[^ADNO]/g,"");
      const allowed=new Set(SW4_ROSTER_PATTERN_OPTIONS.map(x=>x.code));
      return allowed.has(raw)?raw:"";
    }

    function sw4PatternFromStaffName(staff){
      const name=cleanStaffName(staff?.full_name||staff?.staff_full_name||staff?.name||"").toLowerCase();
      if(SW4_KNOWN_STAFF_PATTERN[name]) return SW4_KNOWN_STAFF_PATTERN[name];
      for(const key of Object.keys(SW4_KNOWN_STAFF_PATTERN)){
        if(name && name.includes(key)) return SW4_KNOWN_STAFF_PATTERN[key];
      }
      return "";
    }

    function sw4PatternFromStaff(staff){
      if(!staff) return "";
      const fields=[
        staff.roster_pattern_code,
        staff.pattern_code,
        staff.shift_code,
        staff.roster_code,
        staff.roster_name,
        staff.roster_group,
        staff.shift,
        staff.shift_pattern
      ];
      for(const field of fields){
        const code=sw4CleanPatternCode(field);
        if(code) return code;
      }
      return sw4PatternFromStaffName(staff);
    }

    window.SW4_ROSTER_PATTERN_OPTIONS = SW4_ROSTER_PATTERN_OPTIONS;

    window.rosterPatterns = function(){
      return SW4_ROSTER_PATTERN_OPTIONS.map(p=>({
        pattern_code:p.code,
        pattern_name:p.label,
        description:p.description
      }));
    };

    window.patternCode = function(p){
      return sw4CleanPatternCode(p?.pattern_code||p?.code||p)||String(p?.pattern_code||p?.code||"").toUpperCase();
    };

    window.patternLabel = function(p){
      const code=sw4CleanPatternCode(p?.pattern_code||p?.code||p);
      const match=SW4_ROSTER_PATTERN_OPTIONS.find(x=>x.code===code);
      return match?match.label:(code||String(p?.pattern_name||p?.name||p||""));
    };

    window.rosterAssignmentSelectHtml = function(id, selected=""){
      const parsed=parseRosterAssignment(selected||"");
      let selectedCode=sw4CleanPatternCode(parsed.code||selected);
      const options=SW4_ROSTER_PATTERN_OPTIONS.map(p=>
        `<option value="pattern:${escapeHtml(p.code)}" ${p.code===selectedCode?"selected":""}>${escapeHtml(p.label)}</option>`
      ).join("");
      return `<select id="${escapeHtml(id)}"><option value="">Select shift code...</option>${options}</select><div class="sw4-roster-code-help">Use the official SW4 codes: AAOO, DDNOO, DDDOO, AAOAO, DNNOO.</div>`;
    };

    window.rosterAssignmentValueFromStaff = function(staff){
      const code=sw4PatternFromStaff(staff);
      return code?`pattern:${code}`:"";
    };

    window.staffRosterLabel = function(staff){
      const code=sw4PatternFromStaff(staff);
      if(code) return code;
      if(staff?.roster_pattern_code) return String(staff.roster_pattern_code).toUpperCase();
      if(staff?.pattern_code) return String(staff.pattern_code).toUpperCase();
      if(staff?.roster_name) return staff.roster_name;
      if(staff?.roster_code) return String(staff.roster_code).replaceAll("_"," ");
      if(staff?.roster_group) return staff.roster_group;
      return "—";
    };

    window.parseRosterAssignment = function(value){
      if(!value) return {type:null,code:null};
      const idx=String(value).indexOf(":");
      if(idx<0){
        const code=sw4CleanPatternCode(value);
        return code?{type:"pattern",code}:{type:null,code:null};
      }
      const type=String(value).slice(0,idx);
      const code=sw4CleanPatternCode(String(value).slice(idx+1));
      return code?{type,code}:{type:null,code:null};
    };
  })();
</script>

    function v12DateAdd(iso,delta){const d=new Date(iso);d.setDate(d.getDate()+delta);return isoFromDate(d);}

    function v12SafetyWarnings(staffId,shiftDate,newCode,hours){
      const code=normaliseRosterCode(newCode);const prev=v12GetStaffDayCode(staffId,v12DateAdd(shiftDate,-1));const current=v12GetStaffDayCode(staffId,shiftDate);const next=v12GetStaffDayCode(staffId,v12DateAdd(shiftDate,1));const warnings=[];
      if(code==="D" && prev==="N")warnings.push("DAY DUTY AFTER NIGHT DUTY: this staff member was on night duty the previous day and should not be booked on a normal day duty without proper rest.");
      if(code==="N" && current==="O" && next==="D")warnings.push("NIGHT DUTY BEFORE FIRST DAY DUTY: this staff member is Off today but appears to be starting Day duty tomorrow. Booking a night may create an unsafe roster conflict.");
      if(code==="OT" && prev==="N" && Number(hours||0)>6)warnings.push("POST-NIGHT OVERTIME LIMIT: after night duty, overtime should normally be limited to around 6 hours, usually from 12:00 until 19:00.");
      return warnings;
    }

      const view=appState.kpiPlanningView||"monthly";const bundle=await loadKpiPlanningBundle();const c=kpiCounts(bundle);let body="";
      if(view==="monthly")body=`<div class="stat-grid">${statCard(c.leave,"Leave")}${statCard(c.sick,"Sick Leave")}${statCard(c.til,"TIL In / Out")}${statCard(c.coverNeeded,"Nurses to cover")}</div><div class="grid grid-2"><div class="card"><h3>Top days needing cover</h3><p class="muted">This helps Svetlana see which days may need replacement staff or overtime planning.</p>${renderTopDaysTable(bundle)}</div><div class="card"><h3>Action summary</h3><table class="kpi-small-table kpi-summary-table"><tbody><tr><td>Total cover needed this month</td><td><strong class="sw4-cover-needed">${c.coverNeeded}</strong></td></tr><tr><td>Highest cover needed on one day</td><td><strong class="sw4-cover-needed">${c.coverPeak}</strong></td></tr><tr><td>Pending leave / TIL / overtime requests</td><td><strong>${c.pending}</strong></td></tr><tr><td>Pending overtime invites</td><td><strong>${c.invitesPending}</strong></td></tr><tr><td>Pending Change of Duty records</td><td><strong>${c.codPending}</strong></td></tr></tbody></table></div></div><div class="card"><h3>Monthly totals by category</h3>${renderKpiTypeSummary(bundle)}</div>`;
      else if(view==="totals")body=`<div class="grid grid-2"><div class="card"><h3>Monthly totals by category</h3><p class="muted">Approved and pending requests for the selected month.</p>${renderKpiTypeSummary(bundle)}</div><div class="card"><h3>Staff summary for the month</h3><p class="muted">Useful to see who has the highest leave, sick leave, TIL or overtime activity this month.</p>${renderKpiStaffSummary(bundle)}</div></div>`;
      else if(view==="daily")body=`<div class="card"><h3>Daily summary</h3><p class="muted">The “Cover needed” column shows how many staff may need replacement or overtime planning for each day.</p>${renderDailySummaryTable(bundle)}</div>`;
      else if(view==="overtime")body=await renderOvertimePlanning();
      else body=`<div class="grid grid-2"><div class="card"><h3>Pending leave / TIL / overtime requests</h3>${kpiMonthLeaveRows(bundle).filter(r=>String(r.status||"").toLowerCase()==="pending").map(r=>`<div class="invite-card pending"><strong>${escapeHtml(cleanStaffName(r.staff_full_name||r.full_name||""))}</strong><br><span class="muted">${escapeHtml(formatDate(r.request_date))} · ${escapeHtml(requestSummaryText(r))}</span></div>`).join("")||`<div class="info">No pending leave/TIL/overtime requests.</div>`}</div><div class="card"><h3>Pending overtime invites</h3>${(bundle.invites||[]).filter(r=>String(r.status||"").toLowerCase()==="pending").map(r=>overtimeInviteCard(r,"manager")).join("")||`<div class="info">No pending overtime invites.</div>`}</div></div>`;
      document.getElementById("content").innerHTML=`<div class="card"><div class="actions" style="justify-content:space-between;align-items:flex-start"><div><h2>KPI Planning</h2><h1>Surgical Ward 4</h1><p class="muted">Planning dashboard for Svetlana: monthly totals, cover-needed days, overtime planning and pending actions.</p>${kpiNav(view)}</div><div class="kpi-filter-row"><div><label>Month</label><select onchange="setSelectedMonthPart(this.value)">${sw4MonthDropdownOptions(monthNumberFromIsoMonth(appState.selectedMonth))}</select></div><div><label>Year</label><select onchange="setSelectedYearPart(this.value)">${sw4YearDropdownOptions(yearNumberFromIsoMonth(appState.selectedMonth))}</select></div></div></div></div>${body}`;
      v12WrapAuditWithStartSync();
    };
  })();
</script>


<script>
  /* =========================================================
     SW4 v13 — Svetlana full-control auto-approval UI messages.
     Database v13 performs the approval; this keeps staff-facing messages clear.
     ========================================================= */
  (function(){
    const oldSaveHourlyLeaveFromModalV13 = saveHourlyLeaveFromModal;
    saveHourlyLeaveFromModal = async function(){
      if(!shiftPickerState || !sw4IsFullControl()){
        return oldSaveHourlyLeaveFromModalV13();
      }
      const state=shiftPickerState;
      const staff=state.staff||findMonthlyStaff(state.staffId);
      if(!currentUserMatchesStaffRow(staff)&&!isLeaveApprover()){
        showError("Hourly requests can only be booked for your own row.");
        return;
      }
      const requestCode=normaliseRosterCode(document.getElementById("shiftPickerHourlyType")?.value||"L");
      const startTime=document.getElementById("shiftPickerHourlyStart")?.value||"07:00";
      const hours=Number(document.getElementById("shiftPickerHourlyHours")?.value||1);
      const notes=document.getElementById("shiftPickerHourlyNotes")?.value?.trim()||null;
      const {error}=await sb.rpc("submit_sw4_leave_request",{p_request_date:state.shiftDate,p_request_code:requestCode,p_is_hourly:true,p_start_time:startTime,p_hours:hours,p_staff_note:notes});
      if(error){showError(error.message);return;}
      closeShiftPickerModal();
      showSuccess(`${requestCodeLabel(requestCode)} hourly record approved automatically for Svetlana.`);
      if(appState.activeTab==="leaveTil")await renderLeaveTil();
    };

    const oldRenderLeaveTilV13 = renderLeaveTil;
    renderLeaveTil = async function(){
      await oldRenderLeaveTilV13();
      if(sw4IsFullControl()){
        const firstCard=document.querySelector('#content .card .muted');
        if(firstCard && firstCard.textContent.includes('Requests go to Svetlana')){
          firstCard.textContent='Normal staff requests go to Svetlana for approval. Svetlana’s own leave, TIL, overtime and Change of Duty records are approved automatically.';
        }
      }
    };
  })();
</script>

  function sw4Name(value){ return cleanStaffName(value||""); }
  function sw4NameKey(value){ return sw4Name(value).toLowerCase(); }
  function sw4CurrentName(){ return sw4Name(appState.profile?.full_name||appState.profile?.email||"Signed in"); }
  function sw4CurrentRole(){ return labelRole(appState.profile?.role||""); }
  function sw4SpecialOrder(row){
    const key = sw4NameKey(row?.full_name);
    if(key === 'svetlana fenech') return 0;
    if(key === 'agnes micallef') return 1;
    return 999;
  }
  function sw4CompareStaffRows(a,b){
    const sa = sw4SpecialOrder(a), sb = sw4SpecialOrder(b);
    if(sa !== sb) return sa - sb;
    const rd = roleSortOrder(a?.role) - roleSortOrder(b?.role);
    if(rd !== 0) return rd;
    return sw4Name(a?.full_name).localeCompare(sw4Name(b?.full_name));
  }
  function sw4ApplyHeaderBranding(){
    const brand = document.querySelector('header .brand');
    if(brand){
      brand.innerHTML = `
        <div class="sw4-brand-wrap">
          <img src="${SW4_LOGO_URI}" alt="Mater Dei Hospital" class="sw4-brand-logo">
          <div class="sw4-brand-text">
            <div class="brand-title">Mater Dei Hospital</div>
          </div>
        </div>`;
    }
    const top = document.getElementById('topUser');
    if(top){
      if(appState.profile){
        top.innerHTML = `<strong><span class="sw4-header-ward">Surgical Ward 4</span> — <span class="sw4-header-name">${escapeHtml(sw4CurrentName())}</span></strong><span class="role-inline">${escapeHtml(sw4CurrentRole())}</span>`;
      } else {
        top.textContent = '';
      }
    }
  }

  const originalShowAppV14 = showApp;
  showApp = function(){
    originalShowAppV14();
    sw4ApplyHeaderBranding();
  };

  const oldReloadCurrentTabV14 = reloadCurrentTab;
  reloadCurrentTab = async function(){
    await oldReloadCurrentTabV14();
    sw4ApplyHeaderBranding();
  };

  getTabs = function(){
    const tabs = [["monthlyRoster","Monthly Roster"],["leaveTil","Leave, TIL & OT"],["changeDuty","Change of Duty"],["myRecords","My Record History"]];
    if(sw4IsFullControl()){
      tabs.push(["staffManagement","My Ward Staff"]);
      tabs.push(["auditVisuals","KPI Planning"]);
      tabs.push(["auditHistory","Audit History"]);
    }
    tabs.push(["myAccount","My Account"]);
    return tabs;
  };

  const oldNormaliseRosterCodeV14 = normaliseRosterCode;
  normaliseRosterCode = function(code){
    const clean = oldNormaliseRosterCodeV14(code);
    if(clean === 'LL') return 'L';
    return clean;
  };
  longLeaveDisplayCode = function(daysMap, isoDate, actualCode){
    return normaliseRosterCode(actualCode || '');
  };

  const oldRenderMonthlyRosterV14 = renderMonthlyRoster;
  renderMonthlyRoster = async function(){
    await oldRenderMonthlyRosterV14();
    sw4ApplyHeaderBranding();
    document.querySelectorAll('.legend-compact > span').forEach(el => {
      if((el.textContent||'').toLowerCase().includes('long leave')) el.remove();
    });
  };

  groupRosterByStaff = function(rows){
    const map = new Map();
    for(const row of (rows||[])){
      if(!map.has(row.staff_id)){
        map.set(row.staff_id,{staff_id:row.staff_id,full_name:row.full_name,role:row.role,roster_group:row.roster_group,roster_code:row.roster_code,roster_name:row.roster_name,roster_pattern_code:row.roster_pattern_code,days:{}});
      }
      map.get(row.staff_id).days[row.shift_date] = row;
    }
    return Array.from(map.values()).sort(sw4CompareStaffRows);
  };

  loadSw4StaffOptions = async function(){
    if(appState.staffRows && appState.staffRows.length){
      appState.staffRows = appState.staffRows.slice().sort(sw4CompareStaffRows);
      return appState.staffRows;
    }
    const wardId=requireSelectedWard();
    const {data,error}=await sb.rpc('get_ward_staff_members',{p_ward_id:wardId});
    if(error) throw error;
    appState.staffRows=(data||[]).slice().sort(sw4CompareStaffRows);
    return appState.staffRows;
  };
